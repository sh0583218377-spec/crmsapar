<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Referrer-Policy" content="no-referrer">
<meta name="robots" content="noindex,nofollow">
<title>BookPro – מערכת ניהול תורים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --g1:#6C3FF5;--g2:#A855F7;--g3:#EC4899;
  --teal:#0EA5E9;--teal2:#06B6D4;
  --green:#10B981;--green2:#34D399;
  --orange:#F59E0B;--orange2:#FCD34D;
  --red:#EF4444;
  --bg:#F0F4FF;--surface:#fff;--surface2:#F8F9FF;
  --nav:#1E1B4B;--nav2:#312E81;
  --primary:#6C3FF5;
  --text:#1E1B4B;--text2:#6B7280;--text3:#9CA3AF;
  --border:#E0E7FF;
  --shadow:0 2px 16px rgba(108,63,245,.08);
  --shadow-lg:0 8px 40px rgba(108,63,245,.18);
  --shadow-card:0 1px 8px rgba(0,0,0,.06);
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --sw:250px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;-webkit-tap-highlight-color:transparent}
button{font-family:'Heebo',sans-serif;cursor:pointer;border:none;outline:none;-webkit-appearance:none}
input,select,textarea{font-family:'Heebo',sans-serif;direction:rtl;outline:none;-webkit-appearance:none;appearance:none}
.screen{display:none !important;min-height:100vh}
.screen.active{display:block !important}
#screen-login.active{display:flex !important;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F0C29 0%,#302B63 45%,#24243e 100%)}
/* LOGIN */
.login-wrap{width:100%;max-width:400px;padding:16px;animation:fadeUp2 .6s cubic-bezier(.34,1.2,.64,1)}
@keyframes fadeUp2{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-card{background:rgba(255,255,255,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:28px;padding:40px 32px;box-shadow:0 0 0 1px rgba(255,255,255,.1),0 24px 80px rgba(0,0,0,.5);position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(108,63,245,.35),transparent 70%);pointer-events:none}
.login-card::after{content:'';position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(79,70,229,.25),transparent 70%);pointer-events:none}
.login-logo{text-align:center;margin-bottom:32px;position:relative;z-index:1}
.login-icon{width:72px;height:72px;background:linear-gradient(135deg,#6C3FF5,#A855F7);border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;box-shadow:0 8px 32px rgba(108,63,245,.5),inset 0 1px 0 rgba(255,255,255,.2)}
.login-logo h1{font-family:'Frank Ruhl Libre',serif;font-size:28px;font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.3)}
.login-logo p{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px}
.login-fields{position:relative;z-index:1}
.lg-field{margin-bottom:14px}
.lg-field label{display:block;font-size:11px;font-weight:800;color:rgba(255,255,255,.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px}
.lg-field .inp-wrap{position:relative}
.lg-field .inp-ic{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.lg-field input{width:100%;padding:13px 42px 13px 14px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.12);border-radius:14px;font-size:15px;color:#fff;transition:all .2s;outline:none}
.lg-field input::placeholder{color:rgba(255,255,255,.3)}
.lg-field input:focus{border-color:rgba(167,139,250,.7);background:rgba(255,255,255,.12);box-shadow:0 0 0 4px rgba(108,63,245,.2)}
.lg-field input:focus + .inp-ic{opacity:.7}
/* Remember me custom checkbox */
.lg-remember{display:flex;align-items:center;gap:10px;margin:14px 0 20px;cursor:pointer;user-select:none;position:relative;z-index:1}
.lg-remember input[type=checkbox]{display:none}
.lg-check-box{width:20px;height:20px;border-radius:6px;border:2px solid rgba(255,255,255,.25);background:rgba(255,255,255,.07);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.lg-remember input[type=checkbox]:checked + .lg-check-box{background:linear-gradient(135deg,#6C3FF5,#A855F7);border-color:transparent;box-shadow:0 2px 8px rgba(108,63,245,.4)}
.lg-check-box::after{content:'✓';color:#fff;font-size:12px;font-weight:900;opacity:0;transition:opacity .15s}
.lg-remember input[type=checkbox]:checked + .lg-check-box::after{opacity:1}
.lg-remember-lbl{font-size:13px;color:rgba(255,255,255,.55)}
.btn-login{width:100%;padding:15px;background:linear-gradient(135deg,#6C3FF5,#A855F7);color:#fff;border-radius:14px;font-size:16px;font-weight:800;transition:all .2s;box-shadow:0 4px 20px rgba(108,63,245,.5),inset 0 1px 0 rgba(255,255,255,.15);position:relative;z-index:1;letter-spacing:.3px}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(108,63,245,.6)}.btn-login:active{transform:scale(.98)}
.login-err{background:rgba(239,68,68,.15);color:#FCA5A5;padding:11px 14px;border-radius:12px;font-size:13px;margin-top:12px;display:none;border:1px solid rgba(239,68,68,.3);font-weight:600;text-align:center;position:relative;z-index:1}
.login-footer{text-align:center;margin-top:24px;font-size:12px;color:rgba(255,255,255,.25)}
/* LAYOUT */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--nav);color:#fff;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;right:0;height:100vh;z-index:200;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb-logo{padding:20px 18px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo-ic{width:40px;height:40px;background:linear-gradient(135deg,var(--g1),var(--g3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo h2{font-family:'Frank Ruhl Libre',serif;font-size:19px;color:#fff;font-weight:900}
.sb-logo span{font-size:10px;color:rgba(255,255,255,.4)}
.sb-user{padding:13px 16px;background:var(--nav2);display:flex;align-items:center;gap:11px}
.sb-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g3));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0}
.sb-info strong{display:block;color:#fff;font-size:13px}
.sb-info small{color:rgba(255,255,255,.45);font-size:11px}
nav.snav{flex:1;padding:8px 0;overflow-y:auto}
.nav-sec{padding:10px 16px 3px;font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 16px;color:rgba(255,255,255,.65);font-size:14px;cursor:pointer;transition:all .2s;border-right:3px solid transparent;min-height:44px}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(108,63,245,.3),transparent);color:#fff;border-right-color:#A78BFA}
.nav-badge{background:#EF4444;color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:50px;margin-right:auto;margin-left:4px;min-width:16px;text-align:center;line-height:1.5}
.nav-dot{width:8px;height:8px;background:#EF4444;border-radius:50%;margin-right:auto;margin-left:6px;flex-shrink:0;box-shadow:0 0 0 2px rgba(239,68,68,.2)}
.nav-item .ni{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.sb-bot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout{width:100%;padding:10px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.6);border-radius:var(--radius-sm);font-size:13px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-logout:hover{background:rgba(239,68,68,.2);color:#FCA5A5}
/* SYNC STATUS in sidebar */
.sync-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;font-size:11px;font-weight:600;border-radius:50px;margin:0 12px 10px;opacity:.7}
.sync-on{background:rgba(16,185,129,.15);color:#6EE7B7}
.sync-off{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);flex-shrink:0}
.sync-dot-on{background:#34D399}
.sync-dot.pulse{animation:syncPulse 1.5s infinite}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
.main-content{margin-right:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar h1{font-size:20px;font-weight:800}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.content-area{padding:24px;flex:1}
/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;transition:all .18s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;touch-action:manipulation}
.btn-primary{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;box-shadow:0 3px 12px rgba(108,63,245,.35)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,63,245,.45)}
.btn-teal{background:linear-gradient(135deg,var(--teal),var(--teal2));color:#fff}
.btn-green{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}
.btn-orange{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff}
.btn-danger{background:linear-gradient(135deg,var(--red),#F87171);color:#fff;box-shadow:0 3px 12px rgba(239,68,68,.3)}
.btn-danger:hover{transform:translateY(-1px)}
.btn-outline{background:#fff;border:2px solid var(--border);color:var(--text2);box-shadow:var(--shadow-card)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-ghost{background:transparent;color:var(--text2)}.btn-ghost:hover{background:var(--surface2)}
.btn-sm{padding:7px 14px;font-size:13px}.btn-xs{padding:5px 10px;font-size:12px}
.btn-icon{padding:9px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text2);font-size:17px;transition:all .15s;border:none;cursor:pointer}
.btn-icon:hover{background:var(--border);color:var(--text)}.btn:active{transform:scale(.97) !important}
/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-card);border:1px solid var(--border);overflow:hidden}
.card-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-header h2{font-size:16px;font-weight:800}.card-body{padding:20px}
/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{border-radius:var(--radius);padding:20px;color:#fff;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12)}
.stat-card::before{content:'';position:absolute;top:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.1)}
.stat-card::after{content:'';position:absolute;bottom:-10px;right:10px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.08)}
.sc-purple{background:linear-gradient(135deg,#6C3FF5,#A855F7)}.sc-teal{background:linear-gradient(135deg,#0EA5E9,#06B6D4)}
.sc-green{background:linear-gradient(135deg,#10B981,#34D399)}.sc-orange{background:linear-gradient(135deg,#F59E0B,#FCD34D);color:rgba(0,0,0,.75)}
.stat-icon{font-size:26px;margin-bottom:10px;position:relative;z-index:1}
.stat-num{font-size:28px;font-weight:900;position:relative;z-index:1;line-height:1}
.stat-label{font-size:13px;opacity:.85;margin-top:5px;font-weight:600;position:relative;z-index:1}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:4px 11px;border-radius:50px;font-size:12px;font-weight:700;white-space:nowrap}
.bdg-purple{background:#EDE9FE;color:#5B21B6}.bdg-green{background:#D1FAE5;color:#065F46}
.bdg-red{background:#FEE2E2;color:#991B1B}.bdg-orange{background:#FEF3C7;color:#92400E}
.bdg-gray{background:#F3F4F6;color:#6B7280}.bdg-teal{background:#E0F2FE;color:#0C4A6E}
/* TABLE */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{padding:12px 16px;text-align:right;font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;background:var(--surface2);border-bottom:2px solid var(--border);white-space:nowrap}
tbody td{padding:14px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}tbody tr:hover{background:var(--bg)}
/* MODAL */
.mo-overlay{position:fixed;inset:0;background:rgba(15,12,60,.55);display:flex;align-items:center;justify-content:center;z-index:999;animation:fadeIn .2s;padding:12px;backdrop-filter:blur(3px)}
.mo-overlay.hidden{display:none}
.modal{background:var(--surface);border-radius:20px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:popIn .25s cubic-bezier(.34,1.2,.64,1)}
.mo-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.mo-head h3{font-size:18px;font-weight:800}.mo-body{padding:22px}
.mo-foot{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.btn-x{background:var(--surface2);border-radius:50%;width:32px;height:32px;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-x:hover{background:var(--border);color:var(--text)}
/* FORMS */
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;transition:all .18s;background:var(--surface2)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);background:#fff;box-shadow:0 0 0 4px rgba(108,63,245,.08)}
.field textarea{resize:vertical;min-height:75px}.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fhint{font-size:12px;color:var(--text3);margin-top:5px}
/* APPT CARD */
.appt-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;border-right:4px solid var(--border);border:1px solid var(--border);border-right-width:4px;transition:all .15s;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card)}
.appt-card:hover{transform:translateX(-3px);box-shadow:var(--shadow)}
.appt-card.busy{border-right-color:var(--red)}.appt-card.free{border-right-color:var(--green)}
.apt-time{font-size:17px;font-weight:900;color:var(--primary);min-width:52px;text-align:center;flex-shrink:0}
.apt-info{flex:1;min-width:0}.apt-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.apt-svc{font-size:13px;color:var(--text2)}.apt-acts{display:flex;gap:6px;align-items:center;flex-shrink:0}
.stog{display:inline-flex;border-radius:50px;overflow:hidden;border:2px solid var(--border);font-size:12px;font-weight:700;flex-shrink:0}
.sopt{padding:5px 11px;cursor:pointer;transition:all .2s;color:var(--text2)}
.sopt.s-free{background:var(--green);color:#fff}.sopt.s-busy{background:var(--red);color:#fff}
/* SEARCH */
.srch-bar{display:flex;align-items:center;gap:10px;background:var(--surface);border:2px solid var(--border);border-radius:50px;padding:10px 18px;transition:all .2s;box-shadow:var(--shadow-card)}
.srch-bar:focus-within{border-color:var(--primary);box-shadow:0 0 0 4px rgba(108,63,245,.1)}
.srch-bar input{flex:1;border:none;font-size:15px;background:transparent}
.srch-bar .si{color:var(--text3);font-size:19px;flex-shrink:0}
/* CUSTOMER HERO */
.cust-hero{background:linear-gradient(135deg,var(--g1) 0%,var(--g2) 50%,var(--g3) 100%);padding:28px;color:#fff;position:relative;overflow:hidden}
.cust-hero::before{content:'';position:absolute;top:-40px;left:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08)}
.cust-av{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;margin-bottom:12px;position:relative;z-index:1;border:3px solid rgba(255,255,255,.4)}
.cust-name{font-size:24px;font-weight:900;position:relative;z-index:1}
.cust-phone{opacity:.85;font-size:14px;margin-top:4px;position:relative;z-index:1}
.cust-stats{display:flex;gap:14px;margin-top:16px;position:relative;z-index:1;flex-wrap:wrap}
.cst{text-align:center;background:rgba(255,255,255,.15);border-radius:10px;padding:8px 14px}
.cst-num{font-size:18px;font-weight:900}.cst-lbl{font-size:11px;opacity:.75;margin-top:2px}
/* CALENDAR */
.cal-wrap{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-card);border:1px solid var(--border);padding:18px;margin-bottom:20px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-title{font-size:16px;font-weight:800}
.cal-nav{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:none;font-size:15px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.cal-nav:hover{background:var(--primary);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dow{text-align:center;font-size:11px;font-weight:800;color:var(--text2);padding:4px 0;margin-bottom:4px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text);position:relative;font-weight:600;user-select:none}
.cal-day:hover:not(.empty){background:var(--surface2)}.cal-day.today{background:rgba(108,63,245,.12);color:var(--primary);font-weight:900}
.cal-day.selected{background:linear-gradient(135deg,var(--g1),var(--g2)) !important;color:#fff !important;font-weight:900;box-shadow:0 3px 10px rgba(108,63,245,.4)}
.cal-day.empty{pointer-events:none;visibility:hidden}
.cal-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--red)}
.cal-day.selected .cal-dot{background:rgba(255,255,255,.8)}
/* GALLERY */
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.gal-item{aspect-ratio:1;border-radius:var(--radius-sm);overflow:hidden;background:linear-gradient(135deg,var(--surface2),var(--border));cursor:pointer;position:relative;box-shadow:var(--shadow-card);transition:transform .15s}
.gal-item:hover{transform:scale(1.04)}
.gal-img{width:100%;height:100%;object-fit:cover;display:block}
.gal-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(15,10,60,.75),transparent);color:#fff;padding:20px 8px 6px;font-size:11px;text-align:center;line-height:1.4}
.gal-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px;background:linear-gradient(135deg,#EDE9FE,#E0E7FF);color:var(--primary)}
/* UPLOAD */
.photo-drop{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:18px;text-align:center;transition:all .2s;background:var(--surface2)}
.photo-drop:hover{border-color:var(--primary);background:#EDE9FE}
.upload-btns{display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap}
/* CUSTOMER CARDS */
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.cmc{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-card);border:1px solid var(--border);cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.cmc::before{content:'';position:absolute;top:0;right:0;left:0;height:4px;background:linear-gradient(90deg,var(--g1),var(--g3))}
.cmc:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.cmc-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;margin-bottom:10px}
.cmc-name{font-size:15px;font-weight:800;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmc-phone{font-size:12px;color:var(--text2);margin-bottom:10px}
.cmc-stats{display:flex;gap:12px;font-size:12px;color:var(--text2)}.cmc-stat span{font-weight:800;color:var(--primary)}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:420px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;background:var(--bg);border-radius:var(--radius-sm)}
.cb{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.55}
.cb-in{background:var(--surface);border:1px solid var(--border);align-self:flex-start;border-bottom-right-radius:4px}
.cb-out{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;align-self:flex-end;border-bottom-left-radius:4px}
.cb-time{font-size:10px;color:var(--text3);margin-top:2px}
.chat-inp-row{display:flex;gap:8px;margin-top:10px}
.chat-inp-row input{flex:1;padding:11px 16px;border:2px solid var(--border);border-radius:50px;font-size:14px;transition:border .2s}
.chat-inp-row input:focus{border-color:var(--primary)}
.chat-inp-row button{padding:11px 20px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;border-radius:50px;font-size:14px;font-weight:700}
.chat-list-item{display:flex;align-items:center;gap:14px;padding:15px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.chat-list-item:hover{background:var(--bg)}
.chat-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0}
/* HOURS */
.hr-row{display:grid;grid-template-columns:72px 50px 1fr 1fr;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border)}
.hr-day{font-weight:800;font-size:13px}
.tsw{position:relative;width:40px;height:22px;flex-shrink:0}
.tsw input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--border);border-radius:22px;cursor:pointer;transition:.3s}
.tsl:before{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;bottom:3px;right:3px;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input:checked+.tsl{background:linear-gradient(135deg,var(--g1),var(--g2))}
input:checked+.tsl:before{transform:translateX(-18px)}
.hi{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:var(--radius-xs);font-size:13px;background:var(--surface);transition:border .2s}
.hi:focus{border-color:var(--primary)}
/* PERMS */
.perm-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.perm-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--surface2);border-radius:var(--radius-sm);cursor:pointer;border:1.5px solid var(--border);transition:all .15s}
.perm-item:hover{border-color:var(--primary)}
.perm-item.perm-checked{border-color:var(--primary);background:rgba(108,63,245,.07)}
.perm-item input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--primary)}
.perm-item label{font-size:13px;font-weight:600;cursor:pointer;flex:1}
/* API / SCRIPT CONFIG */
.api-blk{background:var(--surface);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow-card);border:1px solid var(--border);margin-bottom:18px}
.api-blk h3{font-size:16px;font-weight:800;margin-bottom:4px}
.api-blk p{font-size:13px;color:var(--text2);margin-bottom:16px}
.api-st{display:inline-flex;align-items:center;gap:7px;padding:5px 13px;border-radius:50px;font-size:12px;font-weight:700}
.api-ok{background:#D1FAE5;color:#065F46}.api-off{background:#FEE2E2;color:#991B1B}
.api-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.code-block{background:#1E1B4B;color:#C4B5FD;border-radius:var(--radius-sm);padding:14px 16px;font-size:11.5px;font-family:monospace;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto;border:1px solid #312E81;line-height:1.6;direction:ltr;text-align:left}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-size:12px;font-weight:900;flex-shrink:0}
.step-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;font-size:14px}
/* WELCOME */
.wlc{text-align:center;padding:12px 8px}
.wlc-icon{font-size:60px;margin-bottom:14px;display:block;animation:wave 1s ease}
.wlc-name{font-family:'Frank Ruhl Libre',serif;font-size:28px;color:var(--primary);font-weight:900;margin-bottom:8px}
.wlc-sub{font-size:15px;color:var(--text2)}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:13px 26px;border-radius:50px;font-size:14px;font-weight:700;z-index:9999;animation:fadeUp .3s ease,fadeOut .3s 2.7s ease forwards;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:none}
.t-ok{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff}
.t-err{background:linear-gradient(135deg,var(--red),#F87171);color:#fff}
.t-info{background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff}
/* MOBILE */
.mob-top{display:none;background:var(--nav);color:#fff;padding:13px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:150;min-height:52px;touch-action:manipulation}
.mob-top h2{font-size:16px;font-weight:800}
.hamburger{font-size:23px;background:none;color:#fff;padding:2px;cursor:pointer;border:none}
.mob-logout-btn{background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.mob-logout-btn:hover{background:rgba(239,68,68,.35)}
.sb-ovr{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
/* EMPTY */
.empty-s{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-s .ei{font-size:52px;margin-bottom:14px}
.empty-s h3{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px}
/* ADMIN MOBILE */
.d-only{display:block}.m-only{display:none}
.adm-card-list{display:flex;flex-direction:column;gap:10px;padding:14px}
.adm-card{background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;border:1px solid var(--border);box-shadow:var(--shadow-card);display:flex;align-items:center;gap:12px}
.adm-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g3));color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0}
.adm-info{flex:1;min-width:0}.adm-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adm-sub{font-size:12px;color:var(--text2);margin-top:3px}.adm-acts{display:flex;gap:5px;flex-shrink:0}

/* Mobile FAB — floating action button for new appointment */
.mob-fab{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;
  width:56px;height:56px;border-radius:50%;font-size:24px;display:none;
  align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(108,63,245,.5);
  border:none;cursor:pointer;z-index:90;transition:transform .2s}
.mob-fab:active{transform:translateX(-50%) scale(.93)}
/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0;transform:translateX(-50%)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes wave{0%{transform:rotate(0)}20%{transform:rotate(20deg)}40%{transform:rotate(-10deg)}60%{transform:rotate(15deg)}80%{transform:rotate(-5deg)}100%{transform:rotate(0)}}
/* RESPONSIVE */
/* ═══════════════════════════════════════════════════
   RESPONSIVE — Tablet (≤900px)
   Sidebar slides out, mobile top bar appears
   ═══════════════════════════════════════════════════ */
@media(max-width:900px){
  .sidebar{transform:translateX(110%)}
  .sidebar.open{transform:translateX(0)}
  .main-content{margin-right:0}
  .mob-top{display:flex}
  .sb-ovr.vis{display:block}
  .topbar{display:none}
  .d-only{display:none !important}
  .m-only{display:block !important}
  /* 2-col stats on tablet */
  .stats-grid{grid-template-columns:1fr 1fr}
  .perm-grid{grid-template-columns:1fr}
  /* Reduce card padding */
  .card-body{padding:14px}
  .card-header{padding:14px 16px}
}

/* ═══════════════════════════════════════════════════
   RESPONSIVE — Mobile (≤600px)
   Full single-column layout, touch-friendly spacing
   ═══════════════════════════════════════════════════ */
@media(max-width:600px){
  /* Layout */
  .content-area{padding:10px}
  .frow{grid-template-columns:1fr}
  .card{border-radius:12px}
  .card-body{padding:12px}
  .card-header{padding:12px 14px}
  .card-header h2{font-size:15px}

  /* Modal */
  .modal{margin:0;border-radius:20px 20px 0 0;max-height:94vh;width:100%;position:fixed;bottom:0;left:0;right:0;animation:slideUp .25s ease}
  .mo-ovr{align-items:center}
  .mo-body{padding:14px 16px;max-height:65vh;overflow-y:auto}
  .mo-foot{padding:12px 16px;flex-wrap:wrap;gap:8px}
  .mo-foot .btn{flex:1;min-width:120px;justify-content:center}

  /* Stats grid — always 2×2 on mobile */
  .stats-grid{grid-template-columns:1fr 1fr !important;gap:10px;margin-bottom:14px}
  .stat-card{padding:14px 12px;border-radius:12px}
  .stat-num{font-size:24px}
  .stat-label{font-size:12px}
  .stat-icon{font-size:22px;margin-bottom:4px}

  /* Appointment cards — make time bigger, actions wrap */
  .appt-card{padding:12px 14px;gap:10px;border-radius:10px}
  .apt-time{font-size:16px;min-width:46px}
  .apt-name{font-size:14px}
  .apt-svc{font-size:12px}
  .apt-acts{flex-wrap:wrap;gap:5px}
  .stog{font-size:11px}
  .sopt{padding:5px 9px}

  /* Chat */
  .chat-wrap{height:calc(100dvh - 260px);min-height:300px}
  .chat-msgs{padding:10px}
  .chat-inp-row input{font-size:16px} /* prevent iOS zoom */
  .cb{max-width:82%;font-size:13px;padding:9px 12px}

  /* Admin user cards — labeled buttons stack cleanly */
  .adm-card{flex-wrap:wrap;gap:8px;padding:12px}
  .adm-card .adm-av{width:38px;height:38px;font-size:15px}
  .adm-name{font-size:14px}
  .adm-sub{font-size:11px;line-height:1.6}

  /* Gallery */
  .gal-grid{grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}

  /* Forms */
  .hr-row{grid-template-columns:64px 40px 1fr 1fr;gap:5px;padding:8px 10px}
  .field label{font-size:12px}
  input,select,textarea{font-size:16px !important} /* prevent iOS zoom on focus */
  .btn{padding:10px 16px;font-size:13px}
  .btn-sm{padding:7px 12px;font-size:12px}
  .btn-icon{padding:8px;font-size:15px;min-width:36px}

  /* Customers */
  .cust-grid{grid-template-columns:1fr 1fr}
  .cust-hero{padding:20px 16px}
  .cust-name{font-size:20px}
  .cust-av{width:52px;height:52px;font-size:20px}

  /* Hours table */
  .hi{padding:5px 4px;font-size:13px;width:100%}
  .hr-day{font-size:12px}

  /* Navigation items */
  .nav-item{padding:10px 14px;font-size:13px}

  /* Subscription page cards */
  .adm-card[style*="flex-direction:column"]{padding:14px}
  /* Bottom-sheet modal overlay */
  .mo-ovr{align-items:flex-end}
}

/* ═══════════════════════════════════════════════════
   RESPONSIVE — Small phones (≤400px)
   ═══════════════════════════════════════════════════ */
@media(max-width:400px){
  .content-area{padding:8px}
  .login-card{padding:28px 16px}
  .cust-grid{grid-template-columns:1fr}
  .stats-grid{gap:8px}
  .stat-card{padding:12px 10px}
  .stat-num{font-size:22px}
  .modal{border-radius:16px 16px 0 0}
  .mo-foot .btn{font-size:12px;padding:9px 10px}
}

/* Slide-up animation for bottom sheet modals on mobile */
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>

<script>
// ═══════════════════════════════════════════════════
//  PHONE UTILS
// ═══════════════════════════════════════════════════
// Phone for Sheets: 972501234567 (no +, no 0)
function fmtIntl(p) {
  if (!p) return '';
  const d = String(p).replace(/\D/g, '');
  if (d.startsWith('972')) return d;
  if (d.startsWith('0')) return '972' + d.slice(1);
  if (d.startsWith('5')) return '972' + d;
  return d;
}
// Phone for display in app: 0501234567
function fmtLocal(p) {
  if (!p) return '';
  const d = String(p).replace(/\D/g, '');
  if (d.startsWith('972')) return '0' + d.slice(3);
  if (d.startsWith('5')) return '0' + d;
  return d;
}

// ═══════════════════════════════════════════════════
//  DATE HELPERS — LOCAL TIME (no UTC offset bug)
// ═══════════════════════════════════════════════════
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function td()   { return dateStr(new Date()); }
function tdH()  { return new Date().toLocaleDateString('he-IL',{year:'numeric',month:'2-digit',day:'2-digit'}); }
function nowT() { const n=new Date(); return `${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}`; }

// ═══════════════════════════════════════════════════
//  APPS SCRIPT CONFIG — saved to localStorage
// ═══════════════════════════════════════════════════
// ── Pre-fill defaults (can be overridden in Settings) ──
const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzC_EFqcn3A1qPVbpSaqnpJoWcDjpTj-fNYBi1eMyRRfq29ddPUY_MTx0GjvN5WwZg3/exec';
const DEFAULT_SHEET_ID   = '14o-EbhozgOFwVTjnjpfyc9TirjtSfg7uIH8GEuT_Cdg';

const GAPI = (() => {
  // Load from localStorage; fall back to pre-filled defaults
  const s = JSON.parse(localStorage.getItem('bp_gapi') || '{}');
  const obj = {
    scriptUrl:     s.scriptUrl     || DEFAULT_SCRIPT_URL,
    spreadsheetId: s.spreadsheetId || DEFAULT_SHEET_ID,
    save() {
      // Write both to the object AND immediately persist to localStorage
      localStorage.setItem('bp_gapi', JSON.stringify({
        scriptUrl:     this.scriptUrl,
        spreadsheetId: this.spreadsheetId
      }));
    },
    ready() { return !!(this.scriptUrl && this.scriptUrl.startsWith('https://')); }
  };
  // Persist defaults on first load so they survive refresh
  if (!s.scriptUrl) obj.save();
  return obj;
})();

// ═══════════════════════════════════════════════════
//  GOOGLE SHEETS API LAYER (GAPI + SHEETS + SQ)
//
//  GAPI.ready()  → true if spreadsheetId + scriptUrl configured
//  SHEETS.*      → async methods that call the Apps Script web app
//  SQ            → serial queue — prevents parallel write races
//
//  Apps Script URL must be a v5 deployment with doGet + doPost.
//  See apiconfig page to set spreadsheetId + scriptUrl.
// ═══════════════════════════════════════════════════
//  GOOGLE SHEETS LAYER — via Apps Script Web App
// ═══════════════════════════════════════════════════
const SHEETS = {
  // ALL requests go as GET — Apps Script handles GET perfectly with CORS.
  // POST via browser always fails (body dropped on redirect) so we never use it.
  async _req(params) {
    if (!GAPI.ready()) return null;
    try {
      const q = new URLSearchParams(params).toString();
      const r = await fetch(GAPI.scriptUrl + '?' + q, {redirect:'follow'});
      if (!r.ok) return null;
      return await r.json();
    } catch(e) { console.warn('Sheets req:', e.message); return null; }
  },

  // Write operations: action + JSON payload encoded as a single URL param
  async write(action, payload) {
    if (!GAPI.ready()) return null;
    try {
      const jsonPayload = JSON.stringify(payload);
      // Use POST for large payloads (>1500 chars) to avoid GET URL limit
      if (jsonPayload.length > 1500) {
        const r = await fetch(GAPI.scriptUrl, {
          method: 'POST',
          redirect: 'follow',
          headers: {'Content-Type':'text/plain;charset=utf-8'},
          body: JSON.stringify({action, payload})
        });
        if (r.ok) return await r.json();
        // Fallback to GET on POST failure
        console.warn('BookPro: POST failed, falling back to GET');
      }
      const q = new URLSearchParams({action, payload: jsonPayload}).toString();
      const r = await fetch(GAPI.scriptUrl + '?' + q, {redirect:'follow'});
      if (!r.ok) return null;
      return await r.json();
    } catch(e) { console.warn('Sheets write:', e.message); return null; }
  },

  sheetName(user) { return user.name; },

  async createUserSheet(user) {
    const appts = (db.appointments[user.id] || [])
      .sort((a,b) => a.date.localeCompare(b.date)||a.time.localeCompare(b.time))
      .map(a => apptToSheetRow(a));
    const res = await this.write('createSheet', {sheetName:this.sheetName(user), rows:appts});
    if (res) res.url = `https://docs.google.com/spreadsheets/d/${GAPI.spreadsheetId}/edit`;
    return res || {success:true, url:`https://docs.google.com/spreadsheets/d/${GAPI.spreadsheetId}/edit`};
  },

  async pushAppt(user, appt) {
    if (!GAPI.ready()) return;
    const payload = {sheetName:this.sheetName(user), row:apptToSheetRow(appt), date:fmtSheetDate(appt.date), time:appt.time};
    const res = await this.write('updateRow', payload);
    if (res && res.error === 'sheet_not_found') {
      // Sheet missing — create it first then push again
      await this.createUserSheet(user);
      return this.write('updateRow', payload);
    }
    return res;
  },

  // deleteRow — removes a specific date+time row from the user's sheet
  async deleteRow(user, date, time) {
    if (!GAPI.ready()) return;
    const [y,mo,d] = date.split('-');
    const ddmm = `${d}/${mo}/${y}`;
    return this.write('deleteRow', {
      sheetName: this.sheetName(user),
      date: ddmm,
      time: time.substring(0,5)
    });
  },

  async bulkPush(user) {
    if (!GAPI.ready()) return;
    const allAppts = (db.appointments[user.id] || [])
      .sort((a,b) => a.date.localeCompare(b.date)||a.time.localeCompare(b.time))
      .map(a => apptToSheetRow(a));
    const CHUNK = 150; // rows per request — keeps URL under 8KB
    // First chunk: createSheet with forceReset=true — clears & rewrites
    const first = allAppts.slice(0, CHUNK);
    await this.write('createSheet', {sheetName:this.sheetName(user), rows:first, forceReset:true});
    // Remaining chunks: append
    for (let i = CHUNK; i < allAppts.length; i += CHUNK) {
      const chunk = allAppts.slice(i, i + CHUNK);
      await this.write('appendRows', {sheetName:this.sheetName(user), rows:chunk});
    }
    return {success:true};
  },

  async readSheet(user) {
    return this._req({action:'readAll', sheet:this.sheetName(user)});
  },

  async ping() { return this._req({action:'ping'}); },

  // Store users+chats+appointments in __SYSTEM__ tab for cross-device sync
  async writeSystem() {
    if (!GAPI.ready()) return;
    // Build appointments without full-res base64 (too large) — keep Drive URLs + thumbs
    const lightAppts = {};
    const userIds = new Set((db.users||[]).map(u=>u.id));
    Object.keys(db.appointments||{}).forEach(uid => {
      if (!userIds.has(uid)) return; // skip orphaned
      lightAppts[uid] = (db.appointments[uid]||[]).map(a => ({
        ...a,
        imageUrl: a._driveUrl || a._thumb || '',
      }));
    });
    const data = {
      users: db.users,
      adminUsers: db.adminUsers,
      chats: db.chats,
      adminChats: db.adminChats,
      groupChat: db.groupChat,
      groups: db.groups||[],
      _pins: db._pins||{},
      _deletedUsers: db._deletedUsers||[],
      devices: db.devices||{},
      _blockedDevices: db._blockedDevices||{},
      appointments: lightAppts
    };
    return this.write('writeSystem', {data});
  },
  async readSystem() {
    return this._req({action:'readSystem'});
  },

  // Upload image to Drive + store URL in __IMAGES__ tab
  // base64 is resized to ~300px before calling, keeping payload ~15KB
  async writeImage(apptId, userId, base64) {
    if (!GAPI.ready() || !base64 || !base64.startsWith('data:')) return;
    return this.write('writeImage', {apptId, userId, base64});
  },

  // Read all Drive image URLs from __IMAGES__ tab
  async readImages() {
    return this._req({action:'readImages'});
  },

  // Auto-backup: full DB JSON → __BACKUP__ tab + Drive folder
  async writeBackup(jsonStr) {
    if (!GAPI.ready()) return;
    return this.write('writeBackup', {data: jsonStr});
  }
};

// Convert appointment to the row array sent to sheets
// Columns: תאריך | שעה | סטטוס | שם לקוח | טלפון | שירות | מחיר | תיאור | הערות | עדכון אחרון
// Date: YYYY-MM-DD → DD/MM/YYYY (for Sheets display)
function fmtSheetDate(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
// Date: DD/MM/YYYY → YYYY-MM-DD (when reading back from Sheets)
function parseSheetDate(ddmm) {
  if (!ddmm) return '';
  const s = String(ddmm).trim();
  // Already YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  // DD/MM/YYYY
  const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return `${m[3]}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}`;
  return s;
}

// Resize to thumbnail for cross-device image sync via Sheets (col 11)
// 300px @ 0.75 = ~25KB — visible quality, still fits in sheet cell
async function resizeThumbnail(src, size=300, quality=0.75){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(size/img.width,size/img.height,1);
      const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>res('');
    img.src=src;
  });
}

function apptToSheetRow(a) {
  return [
    fmtSheetDate(a.date),
    a.time,
    a.status === 'busy' ? 'תפוס' : 'פנוי',
    a.clientName || '',
    fmtIntl(a.phone),
    a.service || '',
    a.price ? String(a.price) : '',
    a.description || '',
    a.notes || '',
    new Date().toLocaleString('he-IL'),
    a._thumb || ''   // column 11: tiny thumbnail for cross-device image sync
  ];
}

// ═══════════════════════════════════════════════════
//  WRITE QUEUE — guarantees every write reaches Sheets
//  (POST is no-cors so we can't read the response,
//   but we retry up to 3 times before giving up)
// ═══════════════════════════════════════════════════
const SQ = {
  _q: [],
  _running: false,
  _pending: 0,

  push(fn, label) {
    this._q.push({fn, label, tries: 0});
    this._pending++;
    this._updatePill();
    this._run();
  },

  async _run() {
    if (this._running) return;
    this._running = true;
    while (this._q.length) {
      const item = this._q[0];
      try {
        await item.fn();
        this._q.shift();
        this._pending = Math.max(0, this._pending - 1);
        this._updatePill();
      } catch(e) {
        item.tries++;
        if (item.tries >= 3) {
          console.warn('SQ: gave up on', item.label);
          this._q.shift();
          this._pending = Math.max(0, this._pending - 1);
          this._updatePill();
          toast('⚠️ שגיאת כתיבה לגיליון – נסה שוב','err');
        } else {
          await new Promise(r => setTimeout(r, 1200 * item.tries));
        }
      }
    }
    this._running = false;
    this._updatePill();
  },

  _updatePill() {
    if (!GAPI.ready()) return;
    if (this._pending > 0) {
      setSyncStatus('writing');
    } else if (lastSyncTime) {
      setSyncStatus('ok');
    }
  }
};

// ═══════════════════════════════════════════════════
//  CHAT MERGE ENGINE
//
//  Problem: both user and admin write their FULL local
//  db.chats to __SYSTEM__. Last-writer-wins → messages
//  from the other side get overwritten.
//
//  Solution: merge-before-write
//  1. Every message gets a unique `mid` (message ID)
//  2. Before writing, read current __SYSTEM__ chats
//  3. Merge both sides by mid → union, no duplicates
//  4. Write the merged result — nothing is ever lost
// ═══════════════════════════════════════════════════

// Generate a unique message ID
function _mid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

// Ensure every message in an array has a mid
function _ensureMid(msgs){
  (msgs||[]).forEach(m=>{
    if(!m.mid) m.mid=(m.date||'')+'_'+(m.time||'')+'_'+(m.from||'')+'_'+(m.text||'').slice(0,8);
  });
  return msgs||[];
}

// Merge two message arrays: takes union by mid, sorted by date+time
function _mergeChats(local,remote){
  const map={};
  _ensureMid(local).forEach(m=>{map[m.mid]=m;});
  _ensureMid(remote).forEach(m=>{ if(!map[m.mid]) map[m.mid]=m; });
  return Object.values(map).sort((a,b)=>{
    const ta=(a.date||'')+' '+(a.time||'');
    const tb=(b.date||'')+' '+(b.time||'');
    return ta.localeCompare(tb);
  });
}

// Read __SYSTEM__, merge ALL chat threads with local, then write back
// Ensures no message from either side is ever lost
async function _mergeWrite(){
  if(!GAPI.ready()) return false;
  try{
    const sys=await SHEETS.readSystem();
    const remChats=(sys&&sys.data&&sys.data.chats)||{};
    if(!db.chats) db.chats={};
    // Merge every thread: local + remote
    const allUids=new Set([...Object.keys(db.chats),...Object.keys(remChats)]);
    allUids.forEach(uid=>{
      db.chats[uid]=_mergeChats(db.chats[uid]||[],remChats[uid]||[]);
    });
    localStorage.setItem('bp_db',JSON.stringify(db));
    await SHEETS.writeSystem();
    return true;
  }catch(e){ console.warn('_mergeWrite:',e); return false; }
}

// ═══════════════════════════════════════════════════
//  POLLING — real-time sync for logged-in users
//
//  USER (pollSheets, every 2s):
//    reads individual sheet for appointment changes.
//    every 10 cycles (~20s) also reads __SYSTEM__ to
//    detect deletion or subscription changes.
//
//  ADMIN (startAdminBgPoll, every 30s):
//    reads __SYSTEM__ to keep user list in sync.
//
//  CHAT (startAllChatsPoll, every 1.5s):
//    only active while admin is on the 'allchats' page.
// ═══════════════════════════════════════════════════
let pollTimer = null;
let fastPollTimer = null; // short burst after local write
let lastSyncTime = null;
let _pollLock = false;

function startPolling() {
  stopPolling();
  if (!GAPI.ready() || !CU || CU.role !== 'user') return;
  pollSheets();
  pollTimer = setInterval(pollSheets, 2000);
  // Pause/resume when tab visibility changes
  document.addEventListener('visibilitychange', _onVisibility);
}
function stopPolling() {
  if (pollTimer)     { clearInterval(pollTimer);     pollTimer = null; }
  if (fastPollTimer) { clearInterval(fastPollTimer); fastPollTimer = null; }
  if (window._adminBgPoll) { clearInterval(window._adminBgPoll); window._adminBgPoll = null; }
  document.removeEventListener('visibilitychange', _onVisibility);
}

// Background system poll for admin/superadmin — detects user deletions & changes on any page
function startAdminBgPoll() {
  if (window._adminBgPoll) return;
  if (!GAPI.ready()) return;
  window._adminBgPoll = setInterval(async () => {
    if (!CU || (CU.role!=='admin' && CU.role!=='superadmin')) {
      clearInterval(window._adminBgPoll); window._adminBgPoll = null; return;
    }
    if (document.hidden) return; // skip when tab not visible
    try {
      const res = await SHEETS.readSystem();
      if (!res || !res.data) return;
      const sys = res.data;
      const deletedIds = new Set([...(db._deletedUsers||[]),...(sys._deletedUsers||[])]);
      db._deletedUsers = [...deletedIds];
      let changed = false;
      if (Array.isArray(sys.users)) {
        const newUsers = (sys.users||[]).filter(u=>!deletedIds.has(u.id));
        // Always update — catches subscription changes even when count is same
        db.users = newUsers; changed = true;
      }
      // Merge devices so all admin devices see full list
      if (sys.devices) {
        if (!db.devices) db.devices = {};
        Object.keys(sys.devices).forEach(uid=>{
          if (!db.devices[uid]) db.devices[uid]=[];
          const localIds=new Set(db.devices[uid].map(d=>d.devId));
          (sys.devices[uid]||[]).forEach(d=>{if(!localIds.has(d.devId)){db.devices[uid].push(d);changed=true;}});
        });
      }
      if (sys.adminUsers) {
        db.adminUsers = sys.adminUsers; changed = true;
      }
      if (sys._blockedDevices) {
        db._blockedDevices = sys._blockedDevices; changed = true;
      }
      if (changed) {
        // Clean orphaned data
        const validIds = new Set(db.users.map(u=>u.id));
        Object.keys(db.appointments||{}).forEach(uid=>{ if(!validIds.has(uid)) delete db.appointments[uid]; });
        Object.keys(db.chats||{}).forEach(uid=>{ if(!validIds.has(uid)) delete db.chats[uid]; });
        DB.save(db);
        // If current page is affected, refresh it
        if (curPage==='users'||curPage==='allchats'||curPage==='subscriptions') goPage(curPage);
        buildNav();
      }
    } catch(e) {}
  }, 30000); // every 30 seconds
}
function _onVisibility() {
  if (document.hidden) {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  } else {
    if (!pollTimer && CU && GAPI.ready()) {
      pollSheets();
      pollTimer = setInterval(pollSheets, 4000);
    }
  }
}
// After a local write, poll 3× quickly (2 s apart) to confirm it landed
function fastPoll() {
  if (fastPollTimer) return;
  let count = 0;
  fastPollTimer = setInterval(() => {
    pollSheets();
    if (++count >= 3) { clearInterval(fastPollTimer); fastPollTimer = null; }
  }, 2000);
}

let _sysCheckCycle = 0; // counts pollSheets calls; every 10 = readSystem check

async function pollSheets() {
  if (!CU || CU.role !== 'user' || !GAPI.ready() || _pollLock) return;
  _pollLock = true;
  try {
    // Every 10 cycles (~20s) also read __SYSTEM__ to detect deletion / subscription change
    _sysCheckCycle++;
    if (_sysCheckCycle >= 10) {
      _sysCheckCycle = 0;
      const sysRes = await SHEETS.readSystem();
      if (sysRes && sysRes.data) {
        const sys = sysRes.data;
        // Merge deletedUsers
        const deletedIds = new Set([...(db._deletedUsers||[]),...(sys._deletedUsers||[])]);
        db._deletedUsers = [...deletedIds];
        // Check if THIS user was deleted
        if (deletedIds.has(CU.id)) {
          sessClear();
          stopPolling();
          localStorage.setItem('bp_db', JSON.stringify(db));
          location.reload();
          return;
        }
        // Sync users list (subscription changes, etc.)
        if (Array.isArray(sys.users)) {
          db.users = (sys.users||[]).filter(u=>!deletedIds.has(u.id));
        }
        // Sync blocked devices
        if (sys._blockedDevices) db._blockedDevices = sys._blockedDevices;
        localStorage.setItem('bp_db', JSON.stringify(db));
        // Check subscription change (compare full object — catches date changes too)
        const freshUser = db.users.find(u=>u.id===CU.id);
        if (freshUser) {
          const oldStr=JSON.stringify(CU.subscription||{});
          const newStr=JSON.stringify(freshUser.subscription||{});
          if(oldStr!==newStr){
            CU.subscription = freshUser.subscription ? {...freshUser.subscription} : {};
            sessSave(CU, !!localStorage.getItem('bp_sess_rem'));
            const st = subStatus(CU.subscription)||CU.subscription?.status;
            if (st==='expired'||st==='frozen') { showSubscriptionLock(st); return; }
          }
        }
      }
    }

    const result = await SHEETS.readSheet(CU);
    if (!result || result.error) { setSyncStatus('error'); return; }
    lastSyncTime = nowT();
    const rows = result.rows || [];
    let changed = false;

    // Build a lookup: "YYYY-MM-DD_HH:MM" → sheet row
    const sheetMap = {};
    rows.forEach(row => {
      const [rawDate, rTime] = row.map(v => String(v||'').trim());
      if (!rawDate || !rTime) return;
      const rDate = parseSheetDate(rawDate);
      const rTimeClean = rTime.substring(0,5);
      if (rDate && rTimeClean) sheetMap[rDate+'_'+rTimeClean] = row;
    });

    // 1. Update existing local slots from sheet
    (db.appointments[CU.id] || []).forEach(loc => {
      const row = sheetMap[loc.date+'_'+loc.time];
      if (!row) return;
      const [,,rStatus,rName,rPhone,rService,rPrice,rDesc,rNotes] = row.map(v=>String(v||'').trim());
      const newStatus  = rStatus==='תפוס'?'busy':'free';
      const newPhone   = fmtLocal(rPhone.replace(/\D/g,''));
      if (loc.status!==newStatus||loc.clientName!==rName||loc.phone!==newPhone||
          loc.service!==rService||loc.price!==rPrice||loc.description!==rDesc||loc.notes!==rNotes) {
        loc.status=newStatus; loc.clientName=rName; loc.phone=newPhone;
        loc.service=rService; loc.price=rPrice; loc.description=rDesc; loc.notes=rNotes;
        if (newStatus==='free') loc.imageUrl='';
        changed=true;
      }
    });

    // 2. Add rows from sheet that don't exist locally
    const localKeys = new Set((db.appointments[CU.id]||[]).map(a=>a.date+'_'+a.time));
    rows.forEach(row => {
      const [rawDate,rTime,rStatus,rName,rPhone,rService,rPrice,rDesc,rNotes] = row.map(v=>String(v||'').trim());
      if (!rawDate||!rTime) return;
      const rDate=parseSheetDate(rawDate), rTimeClean=rTime.substring(0,5);
      if (!rDate||!rTimeClean||localKeys.has(rDate+'_'+rTimeClean)) return;
      if(!db.appointments[CU.id]) db.appointments[CU.id]=[];
      db.appointments[CU.id].push({
        id:`${CU.id}_${rDate}_${rTimeClean}`,date:rDate,time:rTimeClean,
        status:rStatus==='תפוס'?'busy':'free',clientName:rName,
        phone:fmtLocal(rPhone.replace(/\D/g,'')),service:rService,
        price:rPrice,description:rDesc,notes:rNotes,imageUrl:''
      });
      localKeys.add(rDate+'_'+rTimeClean);
      changed=true;
    });

    if (changed) {
      // Only save if no pending writes (avoid overwriting in-flight data)
      if (SQ._pending === 0) { DB.save(db); }
      else { localStorage.setItem('bp_db', JSON.stringify(db)); }
      // Check if subscription changed — sync CU from updated db.users
      const freshUser = db.users.find(u=>u.id===CU.id);
      if (freshUser && freshUser.subscription?.status !== CU.subscription?.status) {
        CU.subscription = freshUser.subscription;
        sessSave(CU, !!localStorage.getItem('bp_sess_rem'));
        const st = CU.subscription?.status;
        if (st==='expired'||st==='frozen') { showSubscriptionLock(st); return; }
      }
      goPage(curPage);
    }
    // Also check subscription even when no appt change (admin may have locked mid-session)
    else {
      const freshUser = db.users.find(u=>u.id===CU.id);
      if (freshUser && freshUser.subscription?.status !== CU.subscription?.status) {
        CU.subscription = freshUser.subscription;
        sessSave(CU, !!localStorage.getItem('bp_sess_rem'));
        const st = CU.subscription?.status;
        if (st==='expired'||st==='frozen') { showSubscriptionLock(st); return; }
      }
    }
    if (SQ._pending===0) setSyncStatus('ok');
  } finally {
    _pollLock = false;
  }
}

function setSyncStatus(state) {
  const pill = document.getElementById('sync-pill');
  const dot  = document.getElementById('sync-dot');
  if (!pill||!dot) return;
  if (state==='ok'||state==='syncing'){pill.className='sync-pill sync-on';dot.className='sync-dot sync-dot-on';}
  else if(state==='writing'){pill.className='sync-pill sync-on';dot.className='sync-dot sync-dot-on pulse';}
  else{pill.className='sync-pill sync-off';dot.className='sync-dot';}
}

// ═══════════════════════════════════════════════════
//  DATA LAYER — DB + superadmin constant
//
//  All app state lives in localStorage('bp_db') as a JSON object.
//  DB.load()    → parse + sanitize on startup
//  DB.save(db)  → write to localStorage + debounce writeSystem to Sheets
//  DB.init()    → fresh empty structure (new install)
//
//  Schema: { users, adminUsers, appointments, chats, adminChats,
//            groupChat, groups, devices, _pins, _readMarks, _deletedUsers }
// ═══════════════════════════════════════════════════
const SA = { id:'0509825205', pass:'ella2005', name:'שימי', role:'superadmin' };

const DB = {
  load() {
    try {
      const raw = localStorage.getItem('bp_db');
      if (!raw) return this.init();
      const d = JSON.parse(raw);
      if (!d || !d.users || !d.appointments) return this.init();
      if (!d._pins) d._pins = {};
      if (!d._readMarks) d._readMarks = {};
      if (!d.adminChats) d.adminChats = {};
      if (!d.groupChat) d.groupChat = [];
      if (!d.groups) d.groups = [];
      if (!d._deletedUsers) d._deletedUsers = [];
      if (!d._blockedDevices) d._blockedDevices = {};
      // ── Sanitize orphaned data for deleted users ──
      const userIds = new Set((d.users||[]).map(u=>u.id));
      Object.keys(d.appointments||{}).forEach(uid => { if (!userIds.has(uid)) delete d.appointments[uid]; });
      Object.keys(d.chats||{}).forEach(uid => { if (!userIds.has(uid)) delete d.chats[uid]; });
      return d;
    } catch { return this.init(); }
  },
  save(d) {
    const json = JSON.stringify(d);
    try {
      localStorage.setItem('bp_db', json);
    } catch(e) {
      // QuotaExceededError — prune appointments older than 60 days and retry
      if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED') {
        const cutoff = (() => { const dt=new Date(); dt.setDate(dt.getDate()-60); return dateStr(dt); })();
        Object.keys(d.appointments||{}).forEach(uid => {
          // Keep busy appointments forever, only drop old free slots
          d.appointments[uid] = (d.appointments[uid]||[]).filter(a => a.status==='busy' || a.date >= cutoff);
        });
        try {
          localStorage.setItem('bp_db', JSON.stringify(d));
          toast('⚠️ אחסון מלא – תורים ישנים פנויים נמחקו','info');
        } catch(e2) {
          // Still failing — clear only appointments older than today
          const tds = td();
          Object.keys(d.appointments||{}).forEach(uid => {
            d.appointments[uid] = (d.appointments[uid]||[]).filter(a => a.status==='busy' || a.date >= tds);
          });
          try { localStorage.setItem('bp_db', JSON.stringify(d)); } catch(e3) {

  // Merge import: adds new users/appointments without deleting existing data
  mergeImport(file){
    const r=new FileReader();

      try{
        const d=JSON.parse(e.target.result);
        if(!d.users&&!d.appointments){toast('קובץ לא תקין','err');return;}

        if(d.chats) Object.keys(d.chats).forEach(k=>{

// Remove appointments/chats belonging to deleted users
function purgeOrphans(d) {
  if (!d || !d.users) return;
  const validIds = new Set(d.users.map(u => u.id));
  if (d.appointments) Object.keys(d.appointments).forEach(uid => { if (!validIds.has(uid)) delete d.appointments[uid]; });
  if (d.chats)        Object.keys(d.chats).forEach(uid        => { if (!validIds.has(uid)) delete d.chats[uid]; });
  if (d.adminChats)   Object.keys(d.adminChats).forEach(aid   => { /* keep admin chats even if admin removed */ });
  // Clean group members that no longer exist
  if (d.groups) d.groups.forEach(g => { g.members = (g.members||[]).filter(id => validIds.has(id)); });
}

function sessSave(u, rememberMe=false){
  const s={...u, _fp:SHIELD.getFingerprint(), _ts:Date.now()};delete s.pass;
  sessionStorage.setItem('bp_sess',JSON.stringify(s));
  if(rememberMe){
    const exp=Date.now()+30*24*60*60*1000;
    localStorage.setItem('bp_sess_rem',JSON.stringify({...s,_exp:exp}));
  }
}
function sessRestore(){
  try{
    let s=JSON.parse(sessionStorage.getItem('bp_sess'));
    if(!s){
      const rem=JSON.parse(localStorage.getItem('bp_sess_rem')||'null');
      if(rem&&rem._exp&&Date.now()<rem._exp) s=rem;
      else if(rem) localStorage.removeItem('bp_sess_rem');
    }
    if(!s)return false;
    // Fingerprint check — detect session hijacking
    if(s._fp && s._fp !== SHIELD.getFingerprint()){
      SHIELD.logThreat('session_hijack','fingerprint mismatch');
      sessClear();return false;
    }
    if(s.role==='superadmin'&&s.id===SA.id){CU={...SA};enterApp(false);return true;}
    if(s.role==='admin'){
      const a=db.adminUsers.find(x=>x.id===s.id);
      if(a){CU={...a,role:'admin'};enterApp(false);return true;}
      // Admin deleted — clear session
      sessClear();return false;
    }
    if(s.role==='user'){
      const u=db.users.find(x=>x.id===s.id);
      if(u){
        // Reject session if this device is now blocked
        const devId=localStorage.getItem('bp_device_id')||'';
        const isBlocked=devId&&((db._blockedDevices||{})[u.id]||[]).some(d=>d.devId===devId);
        if(isBlocked){sessClear();return false;}
        CU={...u,role:'user'};enterApp(false);return true;
      }
      // User deleted — clear stale session immediately
      sessClear();return false;
    }
  }catch{}return false;
}
function sessClear(){
  sessionStorage.removeItem('bp_sess');
  localStorage.removeItem('bp_sess_rem');
}

// ═══════════════════════════════════════════════════
const SEC = {
  MAX: 5, LOCK_MS: 15*60*1000,
  _k(u){ return 'bp_sec_'+(u||'x'); },
  check(u){
    try{
      const d=JSON.parse(localStorage.getItem(this._k(u))||'{}');
      if(d.lock&&Date.now()<d.lock){
        return {ok:false,msg:`🔒 חשבון נעול. נסה שוב בעוד ${Math.ceil((d.lock-Date.now())/60000)} דקות`};
      }
    }catch{}
    return {ok:true};
  },
  fail(u){
    try{
      const d=JSON.parse(localStorage.getItem(this._k(u))||'{}');
      d.n=(d.n||0)+1;
      if(d.n>=this.MAX){d.lock=Date.now()+this.LOCK_MS;d.n=0;}
      localStorage.setItem(this._k(u),JSON.stringify(d));
    }catch{}
  },
  ok(u){ try{localStorage.removeItem(this._k(u));}catch{} }
};

// ═══════════════════════════════════════════════════
//  ADVANCED SECURITY — XSS/injection protection
// ═══════════════════════════════════════════════════
const SHIELD = {
  // Escape HTML to prevent XSS when displaying user content
  esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); },

  // Validate input against allowed pattern
  clean(s, maxLen=500){
    return String(s||'').trim().slice(0,maxLen);
  },

  // Session integrity fingerprint (detects session hijack attempts)
  getFingerprint(){
    const nav = navigator;
    return btoa([nav.language, nav.platform, screen.width+'x'+screen.height, Intl.DateTimeFormat().resolvedOptions().timeZone].join('|')).slice(0,16);
  },

  // Generate a CSRF-like token stored in sessionStorage
  getToken(){
    let t = sessionStorage.getItem('bp_csrf');
    if(!t){ t = Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join(''); sessionStorage.setItem('bp_csrf',t); }
    return t;
  },

  // Detect suspicious patterns in text input (SQL injection / script injection attempts)
  isSuspicious(s){
    const p = /<script|javascript:|on\w+\s*=|eval\(|document\.|window\.|fetch\(|XMLHttpRequest/i;
    return p.test(s);
  },

  // Sanitize before saving to prevent stored XSS
  sanitize(obj){
    if(typeof obj === 'string') return this.isSuspicious(obj) ? '' : this.clean(obj);
    if(Array.isArray(obj)) return obj.map(v=>this.sanitize(v));
    if(obj && typeof obj === 'object'){
      const out={};
      Object.keys(obj).forEach(k=>{ out[k]=this.sanitize(obj[k]); });
      return out;
    }
    return obj;
  },

  // Log suspicious activity
  logThreat(type, detail=''){
    try{
      const log=JSON.parse(localStorage.getItem('bp_threats')||'[]');
      log.push({type, detail:String(detail).slice(0,200), ts:new Date().toISOString(), ua:navigator.userAgent.slice(0,100)});
      if(log.length>50) log.splice(0,log.length-50);
      localStorage.setItem('bp_threats',JSON.stringify(log));
    }catch{}
    console.warn('🚨 Security threat:', type, detail);
  }
};

function showLoginErr(msg){
  let e=document.getElementById('l-err');if(!e)return;
  e.textContent=msg;e.style.display='block';
  e.animate([{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(0)'}],{duration:280,iterations:2});
}
function doLogin(){
  const uid=(document.getElementById('l-uid')?.value||'').trim();
  const pass=document.getElementById('l-pass')?.value||'';
  const rem=document.getElementById('l-rem')?.checked||false;
  const errEl=document.getElementById('l-err');if(errEl)errEl.style.display='none';

  // Security: detect injection attempts
  if(SHIELD.isSuspicious(uid)||SHIELD.isSuspicious(pass)){
    SHIELD.logThreat('injection_attempt', uid.slice(0,50));
    showLoginErr('❌ קלט לא תקין');return;
  }

  const sec=SEC.check(uid||'x');
  if(!sec.ok){showLoginErr(sec.msg);return;}
  if(uid===SA.id&&pass===SA.pass){SEC.ok(uid);CU={...SA};sessSave(CU,rem);enterApp(true);return;}
  const au=db.adminUsers.find(a=>a.userId===uid&&a.pass===pass);
  if(au){SEC.ok(uid);CU={...au,role:'admin'};sessSave(CU,rem);enterApp(true);return;}
  const bu=db.users.find(u=>u.userId===uid&&u.pass===pass);
  if(bu){
    // Check if this device is blocked for this user
    const devId=localStorage.getItem('bp_device_id')||'';
    const isBlocked=devId&&((db._blockedDevices||{})[bu.id]||[]).some(d=>d.devId===devId);
    if(isBlocked){showLoginErr('🚫 מכשיר זה חסום. פנה למנהל המערכת.');return;}
    SEC.ok(uid);CU={...bu,role:'user'};sessSave(CU,rem);enterApp(true);return;
  }
  SEC.fail(uid||'x');
  const sec2=SEC.check(uid||'x');
  showLoginErr(sec2.ok?'❌ מזהה משתמש או סיסמה שגויים':sec2.msg);
}

// Apply a full sheet rows array into local db.appointments
async function _applySheetRows(user, rows){
  const uid = user.id;
  // Build map of existing local appts
  const localMap = {};
  (db.appointments[uid]||[]).forEach(a=>{ localMap[a.date+'_'+a.time]=a; });

  rows.forEach(row => {
    const [rawDate, rTime, rStatus, rName, rPhone, rService, rPrice, rDesc, rNotes, , rThumb] = row.map(v=>String(v||'').trim());
    if(!rawDate||!rTime) return;
    const date = parseSheetDate(rawDate);
    const time = rTime.substring(0,5);
    if(!date||!time) return;
    const key = date+'_'+time;
    const status = rStatus==='תפוס'?'busy':'free';
    const phone  = fmtLocal(rPhone.replace(/\D/g,''));
    const existing = localMap[key];
    if(existing){
      existing.status=status; existing.clientName=rName; existing.phone=phone;
      existing.service=rService; existing.price=rPrice;
      existing.description=rDesc; existing.notes=rNotes;
      // Only set thumb from sheet if no full-res local image
      if(rThumb && !existing.imageUrl) existing.imageUrl=rThumb;
      if(rThumb) existing._thumb=rThumb;
    } else {
      const newA = {id:`${uid}_${date}_${time}`,date,time,status,
        clientName:rName,phone,service:rService,price:rPrice,
        description:rDesc,notes:rNotes,imageUrl:rThumb||'',_thumb:rThumb||''};
      if(!db.appointments[uid]) db.appointments[uid]=[];
      db.appointments[uid].push(newA);
      localMap[key]=newA;
    }
  });
}
// Sync full-res images from Drive (called on login + every 5 min)
// Updates local appointments that only have a thumb with the real Drive URL
// ── syncImages ──────────────────────────────────────
// Fetches Drive image URLs from __IMAGES__ tab and applies them locally.
// Runs on login + every 5min. Fixes broken images on new devices by replacing
// missing local base64 with the permanent Google Drive URL.
async function syncImages(){
  if(!GAPI.ready()||!CU||CU.role!=='user') return;
  try {
    const res = await SHEETS.readImages();
    if(!res||!res.images||!res.images.length) return;
    const uid = CU.id;
    const appts = db.appointments[uid]||[];
    let changed = false;
    res.images.forEach(img=>{
      const a = appts.find(x=>x.id===img.apptId);
      if(!a||!img.driveUrl) return;
      // Always store Drive URL
      if(a._driveUrl !== img.driveUrl){ a._driveUrl = img.driveUrl; changed = true; }
      // Use Drive URL as display image if:
      //   (a) no imageUrl at all — new device, no local copy
      //   (b) imageUrl is a broken/blob URL (not http and not data:)
      //   (c) imageUrl equals the local thumbnail (Drive URL is higher quality)
      const hasLocalFullRes = a.imageUrl && a.imageUrl.startsWith('data:');
      if(!hasLocalFullRes){
        if(a.imageUrl !== img.driveUrl){ a.imageUrl = img.driveUrl; changed = true; }
      }
    });
    if(changed){ DB.save(db); if(curPage==='main'||curPage==='dateview'||curPage==='allphotos') goPage(curPage); }
  } catch(e){ console.warn('syncImages:', e); }
}

// subStatus: computes the *effective* status considering the to-date
// Returns 'expired' automatically if to-date has passed, regardless of stored status
function subStatus(sub){
  if(!sub) return '';
  // Auto-expire: if stored as active but date passed, treat as expired
  if((sub.status==='active'||!sub.status) && sub.to && sub.to < td()) return 'expired';
  return sub.status||'';
}
function subBadge(s){if(s==='active')return`<span class="badge bdg-green">פעיל</span>`;if(s==='expired')return`<span class="badge bdg-red">פג תוקף</span>`;if(s==='frozen')return`<span class="badge bdg-teal">מוקפא</span>`;return`<span class="badge bdg-gray">—</span>`;}
function es(icon,h,p){return `<div class="empty-s"><div class="ei">${icon}</div><h3>${h}</h3>${p?`<p>${p}</p>`:''}</div>`;}

      const ts=new Date().toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
      localStorage.setItem('bp_last_backup',ts);
      const el=document.getElementById('bk-ts');const dot=document.getElementById('bk-dot');
      if(el)el.textContent='💾 גיבוי אחרון: '+ts;

//  DEVICE MANAGEMENT
//
//  db.devices[uid]         = [{devId, name, lastSeen, sessId}]
//  db._blockedDevices[uid] = [{devId, name, blockedAt}]
//
//  Blocked devices are checked on login and session restore.

function openDevices(uid){
  const u=db.users.find(x=>x.id===uid);if(!u)return;
  if(!db._blockedDevices) db._blockedDevices={};
  const devs=(db.devices||{})[uid]||[];
  const blockedList=(db._blockedDevices[uid]||[]);
  const blockedIds=new Set(blockedList.map(d=>d.devId));
  const myDevId=localStorage.getItem('bp_device_id');

  const renderDev=d=>{
    const isBlocked=blockedIds.has(d.devId);
    const isMe=d.devId===myDevId;
    return `<div style="display:flex;align-items:center;gap:10px;padding:12px;border:1.5px solid ${isBlocked?'#FCA5A5':'var(--border)'};border-radius:var(--radius-sm);margin-bottom:8px;background:${isBlocked?'#FFF1F1':'var(--bg)'}">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          ${d.name}
          ${isMe?'<span style="font-size:10px;background:var(--primary);color:#fff;padding:1px 7px;border-radius:8px">המכשיר שלך</span>':''}
          ${isBlocked?'<span style="font-size:10px;background:#EF4444;color:#fff;padding:1px 7px;border-radius:8px">חסום</span>':''}
        </div>
        <div style="font-size:11px;color:var(--text2);margin-top:2px">כניסה אחרונה: ${d.lastSeen}</div>
        <div style="font-size:10px;color:var(--text3);font-family:monospace;margin-top:1px">${d.devId.slice(0,22)}…</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
        ${!isBlocked
          ?`<button class="btn btn-sm" style="background:#FEE2E2;color:#991B1B;border:none;font-size:12px;white-space:nowrap" onclick="disconnectDevice('${uid}','${d.devId}')">🔌 נתק</button>
            <button class="btn btn-sm" style="background:#FEF3C7;color:#92400E;border:none;font-size:12px;white-space:nowrap" onclick="blockDevice('${uid}','${d.devId}',\'${d.name.replace(/\'/g,'')}\')">🚫 חסום</button>`
          :`<button class="btn btn-sm" style="background:#D1FAE5;color:#065F46;border:none;font-size:12px;white-space:nowrap" onclick="unblockDevice('${uid}','${d.devId}')">✅ בטל חסימה</button>`
        }
      </div>
    </div>`;
  };

  const activeHtml = devs.length
    ? devs.map(renderDev).join('')
    : '<div style="color:var(--text2);text-align:center;padding:24px">אין מכשירים מחוברים</div>';

  // Show blocked devices that are no longer in the active list
  const offlineBlocked = blockedList.filter(b=>!devs.find(d=>d.devId===b.devId));
  const blockedSection = offlineBlocked.length ? `
    <div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">
      <div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:8px">📵 חסומים (לא מחוברים)</div>
      ${offlineBlocked.map(d=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#FFF1F1;border:1px solid #FCA5A5;border-radius:var(--radius-sm);margin-bottom:6px">
          <div>
            <div style="font-weight:600;font-size:13px">${d.name}</div>
            <div style="font-size:11px;color:var(--text2)">נחסם: ${d.blockedAt}</div>
          </div>
          <button class="btn btn-sm" style="background:#D1FAE5;color:#065F46;border:none;font-size:12px" onclick="unblockDevice('${uid}','${d.devId}')">✅ בטל חסימה</button>
        </div>`).join('')}
    </div>` : '';

  showMo(`📱 מכשירים – ${u.name}`, activeHtml+blockedSection,
    [{l:'סגור',c:'btn btn-outline',f:closeMo}]);
}

function disconnectDevice(uid,devId){
  if(!db.devices||!db.devices[uid])return;
  db.devices[uid]=db.devices[uid].filter(d=>d.devId!==devId);
  DB.save(db);
  if(GAPI.ready()) SHEETS.writeSystem();
  toast('מכשיר נותק','ok');
  openDevices(uid);
}

function blockDevice(uid,devId,name){
  if(!db._blockedDevices) db._blockedDevices={};
  if(!db._blockedDevices[uid]) db._blockedDevices[uid]=[];
  if(!db._blockedDevices[uid].find(d=>d.devId===devId))
    db._blockedDevices[uid].push({devId,name,blockedAt:new Date().toLocaleString('he-IL')});
  // Also remove from active devices list
  if(db.devices&&db.devices[uid])
    db.devices[uid]=db.devices[uid].filter(d=>d.devId!==devId);
  DB.save(db);
  if(GAPI.ready()) SHEETS.writeSystem();
  toast('מכשיר נחסם 🚫','ok');
  openDevices(uid);
}

function unblockDevice(uid,devId){
  if(db._blockedDevices&&db._blockedDevices[uid])
    db._blockedDevices[uid]=db._blockedDevices[uid].filter(d=>d.devId!==devId);
  DB.save(db);
  if(GAPI.ready()) SHEETS.writeSystem();
  toast('חסימה בוטלה ✅','ok');
  openDevices(uid);
}

// ── Auto-freeze: mark subscription as 'expired' if end-date passed ──
function autoFreezeExpired(){
  const today = td();
  let changed = false;
  db.users.forEach(u => {
    const sub = u.subscription;
    if (!sub) return;
    if ((sub.status === 'active' || !sub.status) && sub.to && sub.to < today) {
      sub.status = 'expired';
      changed = true;
      // If this is the logged-in user, update CU immediately
      if(window.CU && CU.id===u.id && CU.role==='user'){
        CU.subscription = {...sub};
        sessSave(CU, !!localStorage.getItem('bp_sess_rem'));
      }
    }
  });
  if (changed) DB.save(db);
}

function updSubDate(uid,f,v){
  const u=db.users.find(x=>x.id===uid);if(!u)return;
  if(!u.subscription) u.subscription={};
  u.subscription[f]=v;
  // Auto-compute status from the new date
  const today=td();
  if(u.subscription.to && u.subscription.to < today){
    u.subscription.status='expired';
  } else if(u.subscription.to && u.subscription.to >= today && u.subscription.status==='expired'){
    u.subscription.status='active'; // date extended — restore active
  }
  DB.save(db);
  autoFreezeExpired();
  // Update CU immediately if this is the logged-in user
  if(window.CU&&CU.id===uid&&CU.role==='user'){
    CU.subscription={...u.subscription};
    sessSave(CU,!!localStorage.getItem('bp_sess_rem'));
    const st=subStatus(CU.subscription);
    if(st==='expired'||st==='frozen') showSubscriptionLock(st);

  document.querySelectorAll(`[data-sub-uid="${uid}"]`).forEach(el=>{

}
