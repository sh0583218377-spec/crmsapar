// ─── API CONFIG with Apps Script setup ───
function rApiCfg(){
  const SCRIPT_CODE = `// ╔══════════════════════════════════════════════════╗
// ║  BookPro – Google Apps Script  v5              ║
// ║  שינויים: doPost לפיילואד גדול (writeSystem)  ║
// ║  1. הדבק קוד זה ב-script.google.com            ║
// ║  2. פרסם: Deploy → New deployment               ║
// ║     Type: Web app | Execute as: Me              ║
// ║     Access: Anyone                              ║
// ║  3. העתק את ה-URL ל-BookPro                    ║
// ╚══════════════════════════════════════════════════╝

const SPREADSHEET_ID = '14o-EbhozgOFwVTjnjpfyc9TirjtSfg7uIH8GEuT_Cdg';
const DRIVE_FOLDER_NAME = 'BookPro_Images';

// עמודות – תאריך | שעה | סטטוס | שם לקוח | טלפון | שירות | מחיר | תיאור | הערות | עדכון אחרון | תמונה
const COL_HEADERS = ['תאריך','שעה','סטטוס','שם לקוח','טלפון','שירות','מחיר','תיאור','הערות','עדכון אחרון','תמונה'];

function getFolder() {
  const folders = DriveApp.getFoldersByName(DRIVE_FOLDER_NAME);
  if (folders.hasNext()) return folders.next();
  return DriveApp.createFolder(DRIVE_FOLDER_NAME);
}

// ── Parse params from GET or POST ──
function getParams(e) {
  if (e.postData && e.postData.contents) {
    try {
      const body = JSON.parse(e.postData.contents);
      return { action: body.action || '', p: body.payload || {} };
    } catch(err) {}
  }
  let p = {};
  try { p = JSON.parse(e.parameter.payload || '{}'); } catch(err) {}
  return { action: e.parameter.action || '', p };
}

function doGet(e)  { return route(e); }
function doPost(e) { return route(e); }

function route(e) {
  try {
    const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
    const { action, p } = getParams(e);

    if (action === 'readAll') {
      const sheet = ss.getSheetByName(e.parameter.sheet || '');
      if (!sheet) return json({rows:[], error:'sheet_not_found'});
      const data = sheet.getDataRange().getDisplayValues();
      if (data.length <= 1) return json({rows:[]});
      return json({rows: data.slice(1)});
    }
    if (action === 'ping')        return json({ok:true});
    if (action === 'readSystem')  return readSystem(ss);
    if (action === 'readImages')  return readImages(ss);
    if (action === 'createSheet') return createSheet(ss, p);
    if (action === 'updateRow')   return updateRow(ss, p);
    if (action === 'appendRows')  return appendRows(ss, p);
    if (action === 'writeSystem') return writeSystem(ss, p);
    if (action === 'writeImage')  return writeImage(ss, p);
    if (action === 'writeBackup') return writeBackup(ss, p);
    if (action === 'deleteRow')   return deleteRow(ss, p);

    return json({error:'unknown_action'});
  } catch(err) { return json({error: err.message}); }
}

function setTxt(range) { range.setNumberFormat('@STRING@'); }

function createSheet(ss, p) {
  let sheet = ss.getSheetByName(p.sheetName);
  const isNew = !sheet;
  if (!sheet) sheet = ss.insertSheet(p.sheetName);
  if (!isNew && !p.forceReset) return json({success:true, existed:true});
  sheet.clear();
  const rows = p.rows || [];
  setTxt(sheet.getRange(1, 1, Math.max(2000, rows.length+2), COL_HEADERS.length));
  const hdr = sheet.getRange(1, 1, 1, COL_HEADERS.length);
  hdr.setValues([COL_HEADERS]);
  hdr.setBackground('#4B0082').setFontColor('#ffffff').setFontWeight('bold').setFontSize(11);
  sheet.setFrozenRows(1);
  [110,70,75,145,135,125,70,135,135,140].forEach((w,i) => sheet.setColumnWidth(i+1, w));
  if (rows.length) {
    const dr = sheet.getRange(2, 1, rows.length, COL_HEADERS.length);
    setTxt(dr); dr.setValues(rows); colorRows(sheet, 2, rows);
  }
  return json({success:true});
}

function appendRows(ss, p) {
  const sheet = ss.getSheetByName(p.sheetName);
  if (!sheet) return json({error:'sheet_not_found'});
  const rows = p.rows || [];
  if (!rows.length) return json({success:true});
  const startRow = sheet.getLastRow() + 1;
  const dr = sheet.getRange(startRow, 1, rows.length, COL_HEADERS.length);
  setTxt(dr); dr.setValues(rows); colorRows(sheet, startRow, rows);
  return json({success:true});
}

function updateRow(ss, p) {
  const sheet = ss.getSheetByName(p.sheetName);
  if (!sheet) return json({error:'sheet_not_found', sheetName:p.sheetName});
  const data = sheet.getDataRange().getDisplayValues();
  for (let i = 1; i < data.length; i++) {
    if (String(data[i][0]).trim() === p.date && String(data[i][1]).trim().substring(0,5) === p.time) {
      const range = sheet.getRange(i+1, 1, 1, COL_HEADERS.length);
      setTxt(range); range.setValues([p.row]); colorRow(sheet, i+1, p.row[2]);
      return json({success:true, row:i+1});
    }
  }
  const newR = sheet.getLastRow() + 1;
  const range = sheet.getRange(newR, 1, 1, COL_HEADERS.length);
  setTxt(range); range.setValues([p.row]); colorRow(sheet, newR, p.row[2]);
  return json({success:true, appended:true});
}

function writeImage(ss, p) {
  try {
    const base64 = p.base64 || '';
    if (!base64.startsWith('data:')) return json({error:'invalid_image'});
    const mime = base64.match(/data:([^;]+);base64,/)[1];
    const data = base64.replace(/^data:[^;]+;base64,/, '');
    const blob = Utilities.newBlob(Utilities.base64Decode(data), mime, p.apptId + '.jpg');
    const folder = getFolder();
    const existing = folder.getFilesByName(p.apptId + '.jpg');
    while (existing.hasNext()) existing.next().setTrashed(true);
    const file = folder.createFile(blob);
    file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
    const driveUrl = 'https://drive.google.com/uc?export=view&id=' + file.getId();
    let imgSheet = ss.getSheetByName('__IMAGES__');
    if (!imgSheet) {
      imgSheet = ss.insertSheet('__IMAGES__');
      imgSheet.getRange(1,1,1,4).setValues([['apptId','userId','driveUrl','updated']]);
      imgSheet.getRange(1,1,1,4).setBackground('#1a1a2e').setFontColor('#fff').setFontWeight('bold');
    }
    const rows = imgSheet.getDataRange().getDisplayValues();
    for (let i = 1; i < rows.length; i++) {
      if (rows[i][0] === p.apptId) {
        imgSheet.getRange(i+1,1,1,4).setValues([[p.apptId, p.userId, driveUrl, new Date().toLocaleString('he-IL')]]);
        return json({success:true, driveUrl});
      }
    }
    imgSheet.appendRow([p.apptId, p.userId, driveUrl, new Date().toLocaleString('he-IL')]);
    return json({success:true, driveUrl});
  } catch(err) { return json({error: err.message}); }
}

function readImages(ss) {
  const sheet = ss.getSheetByName('__IMAGES__');
  if (!sheet) return json({images:[]});
  const rows = sheet.getDataRange().getDisplayValues();
  const images = rows.slice(1).filter(r=>r[0]).map(r=>({apptId:r[0],userId:r[1],driveUrl:r[2]}));
  return json({images});
}

function writeBackup(ss, p) {
  try {
    const jsonStr = p.data || '{}';
    const ts = new Date().toLocaleString('he-IL');
    const folder = getFolder();
    const files = folder.getFilesByName('bookpro_backup.json');
    while (files.hasNext()) files.next().setTrashed(true);
    const blob = Utilities.newBlob(jsonStr, 'application/json', 'bookpro_backup.json');
    const file = folder.createFile(blob);
    file.setSharing(DriveApp.Access.ANYONE_WITH_LINK, DriveApp.Permission.VIEW);
    let bSheet = ss.getSheetByName('__BACKUP__');
    if (!bSheet) {
      bSheet = ss.insertSheet('__BACKUP__');
      bSheet.getRange(1,1,1,3).setValues([['גיבוי אחרון','Drive File ID','גודל (bytes)']]);
      bSheet.getRange(1,1,1,3).setBackground('#1a1a2e').setFontColor('#fff').setFontWeight('bold');
    }
    bSheet.getRange(2,1,1,3).setValues([[ts, file.getId(), jsonStr.length]]);
    return json({success:true, ts, fileId:file.getId()});
  } catch(err) { return json({error: err.message}); }
}

function writeSystem(ss, p) {
  let sheet = ss.getSheetByName('__SYSTEM__');
  if (!sheet) sheet = ss.insertSheet('__SYSTEM__');
  sheet.clear();
  sheet.getRange(1,1).setValue(JSON.stringify(p.data || {}));
  return json({success:true});
}
function readSystem(ss) {
  const sheet = ss.getSheetByName('__SYSTEM__');
  if (!sheet) return json({data:null});
  const val = sheet.getRange(1,1).getValue();
  if (!val) return json({data:null});
  try { return json({data:JSON.parse(val)}); } catch(e) { return json({data:null}); }
}

// deleteRow — finds a row by date+time and removes it from the sheet
function deleteRow(ss, p) {
  const sheet = ss.getSheetByName(p.sheetName);
  if (!sheet) return json({error:'sheet_not_found'});
  const data = sheet.getDataRange().getDisplayValues();
  for (let i = data.length - 1; i >= 1; i--) {
    const rowDate = String(data[i][0]).trim();
    const rowTime = String(data[i][1]).trim().substring(0, 5);
    if (rowDate === p.date && rowTime === p.time) {
      sheet.deleteRow(i + 1); // +1 because getDataRange is 0-indexed, sheet rows are 1-indexed
      return json({success: true, deletedRow: i + 1});
    }
  }
  return json({success: true, notFound: true}); // row already gone — not an error
}

function colorRow(sheet, rowNum, status) {
  sheet.getRange(rowNum, 1, 1, COL_HEADERS.length)
       .setBackground(status === 'תפוס' ? '#fce4e4' : '#e8f5e9');
}
function colorRows(sheet, startRow, rows) {
  rows.forEach((row, i) => colorRow(sheet, startRow+i, row[2]));
}
function json(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
         .setMimeType(ContentService.MimeType.JSON);
}`;

// ── Patch management ──
// Patches stored as [{id, name, installedAt}]
function _getPatches(){ try{return JSON.parse(localStorage.getItem('bp_patches')||'[]');}catch{return[];} }
function _savePatches(arr){ localStorage.setItem('bp_patches',JSON.stringify(arr)); }

function _runPatchInstall(content, patchId, dispName, installed){
  const scriptMatch=content.match(/<script[^>]*>([\s\S]*?)<\/script>/);
  if(!scriptMatch){toast('❌ קובץ patch לא תקין — חסר <script>','err');return;}
  const styleMatch=content.match(/<style[^>]*>([\s\S]*?)<\/style>/);
  if(styleMatch){
    const s=document.createElement('style');
    s.id='bp-patch-style-'+patchId;
    s.textContent=styleMatch[1];
    document.head.appendChild(s);
  }
  try{
    // indirect eval — runs in global scope with access to window.db, window.CU etc.
    (0,eval)(scriptMatch[1]);
    const ts=new Date().toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    const newEntry={id:patchId,name:dispName,installedAt:ts};
    const updated=[...installed,newEntry];
    _savePatches(updated);
    toast('✅ תוסף "'+dispName+'" הותקן בהצלחה!','ok');
    renderPatchList();
    setTimeout(()=>goPage(curPage),350);
  }catch(err){
    toast('❌ שגיאה בהפעלת התוסף: '+err.message,'err');
    console.error('Patch error:',err);
  }
}

function renderPatchList(){
  const el=document.getElementById('patches-list');
  if(!el) return;
  const patches=_getPatches();
  if(!patches.length){ el.innerHTML=''; return; }
  let html='<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">';
  html+='<div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px">🔌 תוספים מותקנים ('+patches.length+')</div>';
  html+='<div style="display:flex;flex-direction:column;gap:6px">';
  patches.forEach(function(p){
    var id=typeof p==='string'?p:p.id;
    var name=typeof p==='string'?p:(p.name||p.id);
    var date=typeof p==='object'&&p.installedAt?p.installedAt:'';
    html+='<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm)">';
    html+='<span style="font-size:14px">🔌</span>';
    html+='<div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">'+name+'</div>';
    if(date) html+='<div style="font-size:11px;color:var(--text3)">הותקן: '+date+'</div>';
    html+='</div>';
    html+='<button class="btn btn-sm btn-outline" style="font-size:11px;padding:3px 8px" onclick="renamePatch(\''+id+'\')">✏️ שנה שם</button>';
    html+='<button class="btn btn-sm" style="background:#FEE2E2;color:#991B1B;border:none;font-size:11px;padding:3px 8px;border-radius:6px;cursor:pointer" onclick="removePatch(\''+id+'\')">🗑 הסר</button>';
    html+='</div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}

function removePatch(id){
  showConfirm('🗑 הסרת תוסף','התוסף יוסר מהרשימה.\nשים לב: הקוד שכבר הוזרק פעיל עד לרענון הדף.\n\nלהמשיך?',function(){
    var patches=_getPatches().filter(function(p){return (typeof p==='string'?p:p.id)!==id;});
    _savePatches(patches);
    renderPatchList();
    toast('✅ תוסף הוסר — רענן את הדף להשלמה','ok');
  });
}

function renamePatch(id){
  var patches=_getPatches();
  var p=patches.find(function(x){return (typeof x==='string'?x:x.id)===id;});
  var currentName=typeof p==='string'?p:(p&&p.name?p.name:id);
  showMo('✏️ שנה שם תוסף',
    '<div class="field"><label>שם תוסף</label><input type="text" id="patch-name-inp" value="'+currentName+'" style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text)"></div>',
    [{l:'💾 שמור',c:'btn btn-primary',f:function(){
      var newName=(document.getElementById('patch-name-inp').value||'').trim();
      if(!newName){toast('נא להזין שם','err');return;}
      var updated=patches.map(function(x){
        var xid=typeof x==='string'?x:x.id;
        if(xid!==id) return x;
        return typeof x==='string'?{id:x,name:newName,installedAt:''}:{...x,name:newName};
      });
      _savePatches(updated);
      renderPatchList();
      closeMo();
      toast('✅ שם עודכן','ok');
    }},{l:'ביטול',c:'btn btn-ghost',f:closeMo}]
  );
  setTimeout(function(){var i=document.getElementById('patch-name-inp');if(i){i.focus();i.select();}},100);
}

// System update: import new HTML file, preserve all data
function systemUpdateFromHTML(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const content=e.target.result;
      // ── PATCH MODE: file contains BookPro-Patch marker ──
      if(content.includes('BookPro-Patch')){
        const nameMatch=content.match(/BookPro-Patch:\s*([^\s<\n]+)/);
        const patchId=nameMatch?nameMatch[1]:'patch_'+Date.now();
        // Check not already installed
        const installed=_getPatches();
        if(installed.some(p=>(typeof p==='string'?p:p.id)===patchId)){
          toast('⚠️ התוסף כבר מותקן','info');return;
        }
        // Ask for display name before installing
        showMo('🔌 התקנת תוסף',
          '<div style="margin-bottom:14px;color:var(--text2);font-size:13px">התוסף <strong>'+patchId+'</strong> יוסיף יכולות חדשות למערכת.<br>הנתונים הקיימים לא יימחקו.</div>'+
          '<div class="field"><label>שם להצגה (אפשרי)</label>'+
          '<input type="text" id="patch-disp-name" placeholder="למשל: חיפוש גלובלי" value="'+patchId+'"'+
          ' style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text)"></div>',
          [{l:'✅ התקן',c:'btn btn-primary',f:()=>{
            const dispName=(document.getElementById('patch-disp-name')?.value||'').trim()||patchId;
            closeMo();
            _runPatchInstall(content,patchId,dispName,installed);
          }},{l:'ביטול',c:'btn btn-ghost',f:closeMo}]
        );
        setTimeout(()=>{const i=document.getElementById('patch-disp-name');if(i){i.focus();i.select();}},100);
        return;
      }
      // ── FULL REPLACE MODE: classic HTML update ──
      if(!content.includes('BookPro')){toast('❌ הקובץ אינו קובץ BookPro תקני','err');return;}
      showConfirm('🚀 עדכון מערכת',`עומד להחליף את קוד המערכת בגרסה חדשה.\nכל הנתונים (משתמשים, תורים, הגדרות) ישמרו.\n\nלהמשיך?`,()=>{
        const savedDb=localStorage.getItem('bp_db');
        const savedGapi=localStorage.getItem('bp_gapi');
        const savedRem=localStorage.getItem('bp_sess_rem');
        const blob=new Blob([content],{type:'text/html'});
        const url=URL.createObjectURL(blob);
        sessionStorage.setItem('_bp_update_db',savedDb||'');
        sessionStorage.setItem('_bp_update_gapi',savedGapi||'');
        if(savedRem) sessionStorage.setItem('_bp_update_rem',savedRem);
        toast('✅ פותח גרסה חדשה...','ok');
        setTimeout(()=>{ window.location.href=url; },800);
      });
    }catch(err){toast('❌ שגיאה בטעינת הקובץ: '+err.message,'err');}
  };
  reader.readAsText(file,'UTF-8');
}

// ═══════════════════════════════════════════════════
//  ALL CHATS — unified page (support + admin-inbox + group)
// ═══════════════════════════════════════════════════
let _chatTab='support'; // active tab: 'support'|'admins'|'group'

// Poll allchats while on that page
let _allChatsPoll=null;
function startAllChatsPoll(){
  stopAllChatsPoll();
  if(!GAPI.ready())return;
  _allChatsPoll=setInterval(async()=>{
    if(curPage!=='allchats'){stopAllChatsPoll();return;}
    const res=await SHEETS.readSystem();
    if(!res||!res.data)return;
    let changed=false;
    const sys=res.data;

    // ── Sync deleted users ──────────────────────────
    if(sys._deletedUsers||sys.users){
      const deletedIds=new Set([...(db._deletedUsers||[]),...(sys._deletedUsers||[])]);
      if(sys.users){
        const prevLen=db.users.length;
        db.users=(sys.users||[]).filter(u=>!deletedIds.has(u.id));
        if(db.users.length!==prevLen) changed=true;
      }
      db._deletedUsers=[...deletedIds];
      const validIds=new Set(db.users.map(u=>u.id));
      Object.keys(db.appointments||{}).forEach(uid=>{if(!validIds.has(uid)){delete db.appointments[uid];changed=true;}});
      Object.keys(db.chats||{}).forEach(uid=>{if(!validIds.has(uid)){delete db.chats[uid];changed=true;}});
    }

    // ── Sync blocked devices + device list ─────────
    if(sys._blockedDevices) db._blockedDevices=sys._blockedDevices;
    if(sys.devices){
      if(!db.devices) db.devices={};
      Object.keys(sys.devices).forEach(uid=>{
        if(!db.devices[uid]) db.devices[uid]=[];
        const localIds=new Set(db.devices[uid].map(d=>d.devId));
        (sys.devices[uid]||[]).forEach(d=>{if(!localIds.has(d.devId)) db.devices[uid].push(d);});
      });
    }

    // ── Sync chats ──────────────────────────────────
    let chatChanged=false;
    if(sys.chats){
      Object.keys(sys.chats).forEach(k=>{
        if((sys.chats[k]||[]).length>(db.chats[k]||[]).length){
          db.chats[k]=sys.chats[k]; changed=true; chatChanged=true;
        }
      });
    }
    if(sys.adminChats){
      Object.keys(sys.adminChats).forEach(k=>{
        if((sys.adminChats[k]||[]).length>(db.adminChats[k]||[]).length){
          db.adminChats[k]=sys.adminChats[k]; changed=true;
        }
      });
    }
    if(sys.groupChat&&sys.groupChat.length>(db.groupChat||[]).length){db.groupChat=sys.groupChat;changed=true;}
    if(sys.groups) db.groups=sys.groups;
    // Sync subscriptions from users list (catches admin updating a user's sub)
    if(sys.users){
      const updatedUsers=(sys.users||[]).filter(u=>!((db._deletedUsers||[]).includes(u.id)));
      if(updatedUsers.length>0){ db.users=updatedUsers; changed=true; }
    }

    if(changed){
      localStorage.setItem('bp_db',JSON.stringify(db));
      buildNav();
      _chatInPlaceUpdate();

      // If admin has a chat modal open, also update that modal's messages
      const openUid=window._openAdminChatUid;
      if(openUid&&chatChanged){
        const el=document.getElementById('admin-chat-msgs');
        if(el){
          const wasAtBottom=el.scrollHeight-el.scrollTop-el.clientHeight<80;
          el.innerHTML=renderMsgs(db.chats[openUid]||[]);
          if(wasAtBottom)el.scrollTop=el.scrollHeight;
          // Update read mark so badge disappears
          if(!db._readMarks) db._readMarks={};
          db._readMarks['support_'+openUid]=(db.chats[openUid]||[]).filter(m=>m.from==='user').length;
          localStorage.setItem('bp_db',JSON.stringify(db));
          buildNav();
        }
      }
    }
  },1500);
}
function stopAllChatsPoll(){clearInterval(_allChatsPoll);_allChatsPoll=null;}

// Update chat messages in-place — preserves input focus & scroll position
// Only re-renders the messages list, not the full page
function _chatInPlaceUpdate(){
  const tab=_chatTab;
  const inp=document.getElementById('ci')||document.getElementById('gc-inp2');
  const savedVal=inp?inp.value:'';

  if(tab==='support'){
    // Support tab shows a USER LIST — not a chat thread.
    // A full rAllChats() re-render here would reset scroll + kill input focus.
    // Instead: just refresh the unread badge counts on each user row.
    document.querySelectorAll('[data-chat-uid]').forEach(row=>{
      const uid = row.getAttribute('data-chat-uid');
      const msgs = db.chats[uid]||[];
      const unread = msgs.filter(m=>m.from==='user').length - (db._readMarks?.['support_'+uid]||0);
      const badge = row.querySelector('.chat-unread-badge');
      if(badge) badge.textContent = unread>0 ? unread : '';
      badge && (badge.style.display = unread>0 ? 'inline-flex' : 'none');
      const preview = row.querySelector('.chat-preview');
      if(preview && msgs.length) preview.textContent = msgs.slice(-1)[0].text.slice(0,45);
    });
    return;
  }
  if(tab==='group'){
    const gc=document.getElementById('gc-msgs2');
    if(!gc){if(curPage==='allchats')rAllChats();return;}
    const wasAtBottom=gc.scrollHeight-gc.scrollTop-gc.clientHeight<60;
    // Re-render only message list
    const msgs=db.groupChat||[];
    const myName=CU.role==='superadmin'?SA.name:CU.name;
    gc.innerHTML=msgs.map(m=>{
      const isMine=m.from===CU.id||(m.from==='superadmin'&&CU.role==='superadmin');

        ${!isMine?`<div style="width:30px;height:30px;border-radius:50%;background:${av};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0">${ini}</div>`:''}
        <div style="max-width:72%">
          ${!isMine?`<div style="font-size:10px;font-weight:800;color:var(--text2);margin-bottom:3px">${m.name}</div>`:''}
          <div style="background:${isMine?'linear-gradient(135deg,#6C3FF5,#A855F7)':'var(--surface)'};color:${isMine?'#fff':'var(--text)'};padding:9px 13px;border-radius:${isMine?'14px 14px 3px 14px':'14px 14px 14px 3px'};box-shadow:var(--shadow-card);border:${isMine?'none':'1px solid var(--border)'}">
            ${m.text}
          </div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;text-align:${isMine?'right':'left'}">${m.time}</div>
        </div>
        ${isMine?`<div style="width:30px;height:30px;border-radius:50%;background:${avatarColor(CU.role)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0">${myName.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>`:''}
      </div>`;
    }).join('');
    if(wasAtBottom) gc.scrollTop=gc.scrollHeight;
    return;
  }
  if(tab==='admins'){
    // For open admin chat modal — update messages in-place
    const cm=document.getElementById('chat-msgs');
    if(!cm){if(curPage==='allchats')rAllChats();return;}
    const wasAtBottom=cm.scrollHeight-cm.scrollTop-cm.clientHeight<60;
    let msgs=[];
    if(CU.role==='superadmin'){
      // find which admin chat is open from modal title — use stored _openAdminId
      if(window._openAdminId) msgs=db.adminChats?.[window._openAdminId]||[];
    } else {
      msgs=db.adminChats?.[CU.id]||[];
    }
    if(msgs.length) cm.innerHTML=renderAdminMsgs(msgs, CU.role==='superadmin'?'superadmin':'admin');
    if(wasAtBottom) cm.scrollTop=cm.scrollHeight;
    // Restore input value
    if(inp&&savedVal) inp.value=savedVal;
    if(inp) inp.focus();
  }
}

function rAllChats(){
  markNavRead('allchats');
  if(!db._pins) db._pins={};
  const tab=_chatTab;

  function tabBtn(id,label,hasDot){
    const active=tab===id;
    return `<button onclick="_chatTab='${id}';rAllChats()" style="flex:1;padding:10px 6px;font-size:13px;font-weight:${active?'800':'600'};border:none;border-bottom:3px solid ${active?'var(--primary)':'transparent'};background:transparent;color:${active?'var(--primary)':'var(--text2)'};cursor:pointer;position:relative;transition:all .2s">
      ${label}${hasDot?'<span style="position:absolute;top:8px;right:6px;width:7px;height:7px;background:#EF4444;border-radius:50%"></span>':''}
    </button>`;
  }

  // Calc unread per tab
  const _suppTotal=Object.values(db.chats||{}).reduce((s,arr)=>s+(arr||[]).filter(m=>m.from==='user').length,0);
  const supportDot=CU.role==='superadmin'||(CU.permissions||[]).includes('supportChat') ? _suppTotal>(db._readMarks?.support||0) : false;
  const adminDot=Object.values(db.adminChats||{}).reduce((s,arr)=>s+(arr||[]).filter(m=>!m.read).length,0)>0;
  const groupDot=(db.groupChat||[]).length>(db._readMarks?.groupchat||0);

  let content='';

  if(tab==='support'){
    // User support chats — for superadmin/admin
    const canSee=CU.role==='superadmin'||(CU.permissions||[]).includes('supportChat');
    if(!canSee){content=es('🔒','אין גישה','');} else {
      // Show ALL users — admin can initiate chat, not just respond
      const allUsers=db.users;
      const withChats=allUsers.filter(u=>(db.chats[u.id]||[]).length>0);
      const noChats=allUsers.filter(u=>!(db.chats[u.id]||[]).length);
      const pinned=withChats.filter(u=>db._pins['sup_'+u.id]);
      const unpinned=withChats.filter(u=>!db._pins['sup_'+u.id]);
      const sorted=[...pinned,...unpinned,...noChats];
      if(!sorted.length){content=es('💬','אין משתמשים','');}
      else{
        content=sorted.map(u=>{
          const msgs=db.chats[u.id]||[];
          const userMsgs=msgs.filter(m=>m.from==='user').length;
          const readMark=db._readMarks?.['support_'+u.id]||0;
          const unread=Math.max(0,userMsgs-readMark);
          const last=msgs[msgs.length-1];
          const pinned=db._pins['sup_'+u.id];
          const hasChat=msgs.length>0;
          return `<div data-chat-uid="${u.id}" style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:${pinned?'rgba(109,99,245,.05)':'transparent'};opacity:${hasChat?1:0.65}" onclick="openAdminChat('${u.id}')">
            <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0">${(u.name||'?')[0]}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px"><strong>${u.name}</strong>${pinned?'<span style="font-size:10px">📌</span>':''}${!hasChat?'<span style="font-size:10px;color:var(--text3)">אין שיחה</span>':''}</div>
              <div class="chat-preview" style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${last?last.text.slice(0,50):'לחץ לפתיחת שיחה'}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <span class="chat-unread-badge" style="background:#EF4444;color:#fff;border-radius:50%;min-width:18px;height:18px;font-size:10px;font-weight:900;display:${unread>0?'flex':'none'};align-items:center;justify-content:center;padding:0 3px">${unread>0?unread:''}</span>
              <button onclick="event.stopPropagation();togglePin('sup_${u.id}')" style="font-size:14px;background:none;border:none;cursor:pointer;opacity:.6" title="${pinned?'בטל נעיצה':'נעץ'}">📌</button>
            </div>
          </div>`;
        }).join('');
      }
    }
  } else if(tab==='admins'){
    // Admin inbox (superadmin sees all admins; admin sees own chat with SA)
    if(CU.role==='superadmin'){
      const admins=db.adminUsers;
      if(!admins.length){content=es('💬','אין מנהלים','');}
      else{
        content=admins.map(a=>{
          const msgs=db.adminChats?.[a.id]||[];
          const unread=msgs.filter(m=>m.from==='admin'&&!m.read).length;
          const last=msgs[msgs.length-1];
          const pinned=db._pins['adm_'+a.id];
          return `<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;background:${pinned?'rgba(109,99,245,.05)':'transparent'}" onclick="openInboxChat('${a.id}')">
            <div style="width:40px;height:40px;border-radius:50%;background:${avatarColor('admin')};color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0">${(a.name||'?')[0]}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;gap:6px"><strong>${a.name}</strong>${pinned?'<span style="font-size:10px">📌</span>':''}</div>
              <div style="font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${last?last.text.slice(0,50):'אין הודעות'}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              ${unread>0?`<span style="background:#EF4444;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center">${unread}</span>`:''}
              <button onclick="event.stopPropagation();togglePin('adm_${a.id}')" style="font-size:14px;background:none;border:none;cursor:pointer;opacity:.6">📌</button>
            </div>
          </div>`;
        }).join('');
      }
    } else {
      // Admin — show own chat with superadmin
      if(!db._readMarks) db._readMarks={};
      const msgs=db.adminChats?.[CU.id]||[];
      msgs.forEach(m=>{if(m.from==='superadmin')m.read=true;});
      DB.save(db);
      content=renderAdminChatHtml(msgs,'sendAdminChatMsg()','admin');
    }
  } else if(tab==='group'){
    // Group chat
    if(CU.role!=='admin'&&CU.role!=='superadmin'){content=es('🔒','אין גישה','');}
    else{

// openAdminChat — admin/superadmin opens a chat with a specific user (support tab)
// ── openAdminChat ────────────────────────────────────
// Opens a support chat modal (admin ↔ user).
// Stops startAllChatsPoll while open (prevents conflicting writes).
// Uses merge poll: merges remote + local on every tick.
// Restarts startAllChatsPoll on close.
function openAdminChat(uid){
  const u=db.users.find(x=>x.id===uid);if(!u)return;
  if(!db._readMarks) db._readMarks={};
  db._readMarks['support_'+uid]=(db.chats[uid]||[]).filter(m=>m.from==='user').length;
  localStorage.setItem('bp_db',JSON.stringify(db));
  buildNav();
  window._openAdminChatUid=uid;

  // Stop allchats poll to avoid conflicting writes while modal is open
  stopAllChatsPoll();

  const renderModal=()=>{
    const el=document.getElementById('admin-chat-msgs');if(!el)return;
    const atB=el.scrollHeight-el.scrollTop-el.clientHeight<80;
    el.innerHTML=renderMsgs(_ensureMid(db.chats[uid]||[]));
    if(atB)el.scrollTop=el.scrollHeight;
  };

  const sbHtml=GAPI.ready()
    ? `<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;background:#D1FAE5;border-radius:6px;margin-bottom:8px;font-size:11px;font-weight:700;color:#065F46" id="adm-sb">
        <span id="adm-sbd" style="width:7px;height:7px;border-radius:50%;background:#10B981;flex-shrink:0"></span>
        <span id="adm-sbt">מחובר</span></div>`
    : `<div style="background:#FEF3C7;border-radius:6px;padding:5px 10px;margin-bottom:8px;font-size:11px;font-weight:700;color:#92400E">⚠️ לא מחובר</div>`;

  const chatBody=`<div style="display:flex;flex-direction:column;height:440px">
    ${sbHtml}
    <div id="admin-chat-msgs" class="chat-msgs" style="flex:1;overflow-y:auto;padding:8px">
      ${renderMsgs(_ensureMid(db.chats[uid]||[]))}
    </div>
    <div class="chat-inp-row" style="border-top:1px solid var(--border);padding-top:10px;margin-top:6px">
      <input type="text" id="ci" placeholder="כתוב תשובה..." autocomplete="off"
        onkeydown="if(event.key==='Enter')sendAdminMsg('${uid}')">
      <button onclick="sendAdminMsg('${uid}')">שלח</button>
    </div>
  </div>`;

  showMo(`💬 ${u.name}`, chatBody,
    [{l:'סגור',c:'btn btn-ghost',f:()=>{
      clearInterval(window._adminChatPoll);
      window._adminChatPoll=null;
      window._openAdminChatUid=null;
      closeMo();
      // Restart allchats poll now that modal is closed
      if(curPage==='allchats') startAllChatsPoll();
      rAllChats();
    }}]);

  setTimeout(()=>{
    const e=document.getElementById('admin-chat-msgs');
    if(e)e.scrollTop=e.scrollHeight;
    document.getElementById('ci')?.focus();
  },80);

  // Live merge poll — reads __SYSTEM__ every 1.5s, merges, updates modal
  clearInterval(window._adminChatPoll);
  window._adminChatPoll=setInterval(async()=>{
    if(!document.getElementById('admin-chat-msgs')){
      clearInterval(window._adminChatPoll);window._adminChatPoll=null;return;
    }
    if(!GAPI.ready()) return;
    try{
      const sys=await SHEETS.readSystem();if(!sys||!sys.data)return;
      const remote=(sys.data.chats&&sys.data.chats[uid])||[];
      const local=db.chats[uid]||[];
      const merged=_mergeChats(local,remote);
      const changed=merged.length!==local.length||
        (merged.length>0&&JSON.stringify(merged[merged.length-1])!==JSON.stringify(local[local.length-1]));
      if(changed){
        db.chats[uid]=merged;
        db._readMarks['support_'+uid]=merged.filter(m=>m.from==='user').length;
        localStorage.setItem('bp_db',JSON.stringify(db));
        buildNav();
        renderModal();
        const sbt=document.getElementById('adm-sbt');
        if(sbt) sbt.textContent='עדכון '+new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      }
    }catch(e){
      const sbd=document.getElementById('adm-sbd');
      if(sbd){sbd.style.background='#EF4444';}
    }
  },1500);
}

// sendAdminMsg — admin replies to a user in their support chat
function sendAdminMsg(uid){
  const i=document.getElementById('ci'),t=(i?.value||'').trim();if(!t)return;
  if(!db.chats[uid]) db.chats[uid]=[];
  db.chats[uid].push({mid:_mid(),from:'admin',text:t,time:nowT(),date:td()});

  if(i)i.value='';
  const el=document.getElementById('admin-chat-msgs');
  if(el){el.innerHTML=renderMsgs(db.chats[uid]);el.scrollTop=el.scrollHeight;}
  // Merge-before-write: never overwrites user messages
  if(GAPI.ready()){
    _mergeWrite().catch(()=>{ SHEETS.writeSystem().catch(()=>{}); });
  }
}

function buildCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  const mn=calDate.toLocaleDateString('he-IL',{month:'long',year:'numeric'});
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const tds=td(),sel=dateStr(calDate);
  const busy=new Set((db.appointments[CU.id]||[]).filter(a=>a.status==='busy').map(a=>a.date));
  let cells='';
  for(let i=0;i<first;i++)cells+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls='cal-day';if(ds===tds)cls+=' today';if(ds===sel)cls+=' selected';
    cells+=`<div class="${cls}" onclick="selCal(${y},${m},${d})">${d}${busy.has(ds)?'<div class="cal-dot"></div>':''}</div>`;
  }
  return `<div class="cal-wrap">
    <div class="cal-head"><button class="cal-nav" onclick="chMo(-1)">◀</button><div class="cal-title">${mn}</div><button class="cal-nav" onclick="chMo(1)">▶</button></div>
    <div class="cal-grid">${['א','ב','ג','ד','ה','ו','ש'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
  </div>`;
}
function selCal(y,m,d){calDate=new Date(y,m,d,12,0,0);renderCalDay();}
function chMo(d){calDate=new Date(calDate.getFullYear(),calDate.getMonth()+d,1,12,0,0);renderCalDay();}

    <div class="card-body" style="padding:14px">
      ${sbHtml}

        </div>

    </div></div>`);

  setTimeout(()=>{const e=document.getElementById('chat-msgs');if(e)e.scrollTop=e.scrollHeight;},50);

  clearInterval(window._chatPoll);
  window._chatPoll=setInterval(async()=>{
    if(curPage!=='usersupport'){clearInterval(window._chatPoll);return;}
    if(!GAPI.ready()) return;
    try{
      const sys=await SHEETS.readSystem();
      if(!sys||!sys.data) return;
      const remote=(sys.data.chats&&sys.data.chats[uid])||[];
      const local=db.chats[uid]||[];
      // Merge — never lose messages from either side
      const merged=_mergeChats(local,remote);
      const changed=merged.length!==local.length||
        (merged.length>0&&JSON.stringify(merged[merged.length-1])!==JSON.stringify(local[local.length-1]));

        db.chats[uid]=merged;

        buildNav();

        if(sbt) sbt.textContent='עודכן '+new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
      }
    }catch(e){
      const sb=document.getElementById('chat-sb');
      if(sb) sb.style.background='#FEE2E2';
    }
  },1500);
}

// Force re-sync: merge + write + update display
window._chatRefresh=async function(){
  const btn=document.querySelector('#chat-sb button');
  if(btn){btn.textContent='⏳';btn.disabled=true;}
  const sbt=document.getElementById('chat-sbd');
  if(sbt){sbt.style.background='#f59e0b';sbt.style.animation='pulse 1s infinite';}
  const ok=await _mergeWrite();
  const uid=CU&&CU.id;
  if(ok&&uid){
    const cm=document.getElementById('chat-msgs');
    if(cm){cm.innerHTML=renderMsgs(db.chats[uid]||[]);cm.scrollTop=cm.scrollHeight;}
  }
  const sbd=document.getElementById('chat-sbd');
  if(sbd){sbd.style.background=ok?'#10B981':'#EF4444';sbd.style.animation='';}
  const sbT=document.getElementById('chat-sbt');
  if(sbT) sbT.textContent=ok?'מסונכרן ✓':'שגיאה';
  if(btn){btn.textContent='🔄 רענן';btn.disabled=false;}
};

function sendUserMsg(){
  const i=document.getElementById('ci'),t=(i?.value||'').trim();if(!t)return;
  const uid=CU.id;
  if(!db.chats[uid]) db.chats[uid]=[];
  // Assign unique mid so merge never creates duplicates
  db.chats[uid].push({mid:_mid(),from:'user',text:t,time:nowT(),date:td()});
  DB.save(db);
  i.value=''; i.focus();
  const el=document.getElementById('chat-msgs');
  if(el){el.innerHTML=renderMsgs(db.chats[uid]);el.scrollTop=el.scrollHeight;}
  // Merge-before-write: read __SYSTEM__, merge, write — never overwrites admin replies
  if(GAPI.ready()){
    _mergeWrite().catch(()=>{ SHEETS.writeSystem().catch(()=>{}); });
  }
}
function chatHtml(msgs,sfn){return `<div class="chat-wrap"><div class="chat-msgs" id="chat-msgs">${renderMsgs(msgs)}</div><div class="chat-inp-row"><input type="text" id="ci" placeholder="כתוב הודעה..." onkeydown="if(event.key==='Enter')${sfn}"><button onclick="${sfn}">שלח</button></div></div>`;}
// ── renderMsgs ───────────────────────────────────────
// Renders a support-chat thread (user ↔ admin).
// user messages → right (cb-in), admin messages → left (cb-out)
function renderMsgs(msgs){
  if(!msgs||!msgs.length) return `<div style="text-align:center;color:var(--text2);padding:30px;font-size:14px">שלח הודעה ונחזור אליך 💬</div>`;
  return msgs.map(m=>{
    const isUser = m.from==='user';
    const label  = isUser ? '' : '<div style="font-size:10px;font-weight:800;color:var(--text2);margin-bottom:3px">תמיכה</div>';
    return `<div style="display:flex;flex-direction:column;align-items:${isUser?'flex-end':'flex-start'};margin-bottom:10px">
      ${label}
      <div class="cb ${isUser?'cb-out':'cb-in'}">${m.text}</div>
      <div class="cb-time" style="text-align:${isUser?'right':'left'}">${m.time}</div>
    </div>`;
  }).join('');
}

function getSlotsForDate(date){
  if(!CU||!date) return [];
  const u=db.users.find(x=>x.id===CU.id);
  if(!u||!u.workingHours) return [];
  const dayIdx=new Date(date+'T12:00:00').getDay();
  const dn=DAYS[dayIdx];
  const wh=u.workingHours[dn];
  if(!wh?.a||!wh.s||!wh.e) return [];
  const dur=u.slotDuration||30;
  const [sh,sm]=wh.s.split(':').map(Number), [eh,em]=wh.e.split(':').map(Number);
  let mins=sh*60+sm, eM=(eh===0&&em===0?1440:eh*60+em);
  const existing=(db.appointments[CU.id]||[]).filter(a=>a.date===date);
  const slots=[];
  while(mins+dur<=eM){
    const h=Math.floor(mins/60), m2=mins%60;
    const time=`${String(h).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
    const ex=existing.find(a=>a.time===time);
    slots.push({time,status:ex?ex.status:'none',id:ex?.id});
    mins+=dur;
  }
  return slots;
}

// Auto-format phone: normalize to 972XXXXXXXXX (no + or 0)
function autoFmtPhone(el){
  let v=el.value.replace(/[^\d]/g,'');
  if(v.startsWith('00972'))v=v.slice(2);
  else if(v.startsWith('972')){}  // already correct
  else if(v.startsWith('0'))v='972'+v.slice(1);
  else if(v.startsWith('5'))v='972'+v;
  el.value=v;
}

async function saveAppt(editId, replacing=false){
  const date=document.getElementById('af-dt').value, time=document.getElementById('af-tm').value;
  const clientName=document.getElementById('af-nm').value.trim();
  let phone=document.getElementById('af-ph').value.trim().replace(/[^\d]/g,'');
  if(phone.startsWith('972'))phone='0'+phone.slice(3);
  else if(phone.startsWith('5'))phone='0'+phone;
  const service=document.getElementById('af-sv').value.trim(), price=document.getElementById('af-pr').value;
  const description=document.getElementById('af-dc').value.trim(), notes=document.getElementById('af-nt').value.trim();
  const imageUrl=document.getElementById('af-img')?.value||'';
  if(!date||!time||!clientName||!phone){toast('נא למלא: תאריך, שעה, שם, טלפון','err');return;}
  // Generate thumbnail for cross-device image sync via Sheets (200px)
  let thumb='';
  // Medium-res for Drive upload (800px @0.88) — good quality, ~80KB
  let imgForDrive='';
  if(imageUrl&&imageUrl.startsWith('data:')){
    thumb = await resizeThumbnail(imageUrl,300,0.75);
    imgForDrive = await resizeThumbnail(imageUrl,800,0.88);
  }
  const uid=CU.id;if(!db.appointments[uid])db.appointments[uid]=[];
  const data={clientName,phone,service,price,description,notes,imageUrl,_thumb:thumb,status:'busy'};
  if(editId){
    const a=db.appointments[uid].find(x=>x.id===editId);if(!a)return;
    Object.assign(a,{...data,date,time});DB.save(db);
    SQ.push(()=>SHEETS.pushAppt(CU,a),'editAppt');
    if(imgForDrive) SQ.push(()=>SHEETS.writeImage(a.id,uid,imgForDrive),'uploadImg');
    fastPoll();
    closeMo();toast('תור עודכן ✅','ok');goPage(curPage);return;
  }
  const ex=db.appointments[uid].find(a=>a.date===date&&a.time===time);
  if(ex){showConfirm('⚠️ שעה קיימת',`בתאריך ${date} שעה ${time} כבר קיים תור.\nלעדכן?`,()=>{
    Object.assign(ex,data);DB.save(db);
    SQ.push(()=>SHEETS.pushAppt(CU,ex),'updateExAppt');
    if(imgForDrive) SQ.push(()=>SHEETS.writeImage(ex.id,uid,imgForDrive),'uploadImg');
    fastPoll();closeMo();toast('תור עודכן ✅','ok');goPage(curPage);
  });return;}
  const newA={id:`${uid}_${date}_${time}_${Date.now()}`,date,time,...data};
  db.appointments[uid].push(newA);
  DB.save(db);
  SQ.push(()=>SHEETS.pushAppt(CU,newA),'newAppt');
  // Upload full image to Drive folder — all devices will get the Drive URL on next sync
  if(imgForDrive) SQ.push(()=>SHEETS.writeImage(newA.id,uid,imgForDrive),'uploadImg');
  fastPoll();
  closeMo();toast('תור נוסף! ✅','ok');goPage(curPage);
}

// Permanently removes the appointment from the local DB

function deleteAppt(id){
  const a=(db.appointments[CU.id]||[]).find(x=>x.id===id);
  if(!a){toast('תור לא נמצא','err');return;}
  const label=a.status==='busy'?`${a.date} ${a.time} – ${a.clientName}`:`${a.date} ${a.time} (פנוי)`;

    ()=>{
      const uid=CU.id;
      // Store date+time before removal for Sheets deletion
      const delDate=a.date, delTime=a.time;
      // Remove from local DB
      db.appointments[uid]=(db.appointments[uid]||[]).filter(x=>x.id!==id);

// IMAGE UPLOAD — resize to max 800px and compress before storing
async function handleUpload(input,urlId,prevId){
  const file=input.files[0];if(!file)return;
  toast('מעלה...','info');
  const url=await resizeImage(file,800,0.75);
  document.getElementById(urlId).value=url;
  const p=document.getElementById(prevId);if(p){p.src=url;p.style.display='block';}
  toast('תמונה הועלתה ✅','ok');
}
function resizeImage(file,maxPx,quality){
  return new Promise(res=>{
    const img=new Image();
    const reader=new FileReader();
    reader.onload=e=>{
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxPx||h>maxPx){const r=Math.min(maxPx/w,maxPx/h);w=Math.round(w*r);h=Math.round(h*r);}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        res(c.toDataURL('image/jpeg',quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function _quickCreateSlots(uid, from, to){
  const u=db.users.find(x=>x.id===uid);if(!u)return;
  const ex=(db.appointments[uid]||[]).filter(a=>a.date>=from&&a.date<=to);
  const run=async()=>{
    // Remove existing in range (keep busy ones)
    db.appointments[uid]=(db.appointments[uid]||[]).filter(a=>a.date<from||a.date>to||a.status==='busy');
    const na=[];
    let cur=new Date(from+'T12:00:00'), end=new Date(to+'T12:00:00');
    while(cur<=end){
      const dn=DAYS[cur.getDay()], wh=u.workingHours[dn];
      if(wh?.a&&wh.s&&wh.e){
        const [sh,sm]=wh.s.split(':').map(Number),[eh,em]=wh.e.split(':').map(Number);
        let mins=sh*60+sm, eM=(eh===0&&em===0?1440:eh*60+em), ds=dateStr(cur);
        while(mins+u.slotDuration<=eM){
          const h=Math.floor(mins/60),m2=mins%60;
          const time=`${String(h).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
          const exists=db.appointments[uid].find(a=>a.date===ds&&a.time===time);
          if(!exists) na.push({id:`${uid}_${ds}_${time}`,date:ds,time,status:'free',clientName:'',phone:'',service:'',description:'',price:'',notes:'',imageUrl:''});
          mins+=u.slotDuration;
        }
      }
      cur.setDate(cur.getDate()+1);
    }
    db.appointments[uid]=[...db.appointments[uid],...na];
    DB.save(db);
    toast(`✅ ${na.length} תורים נוצרו עבור ${u.name}`,'ok');
    if(GAPI.ready()){
      SQ.push(()=>SHEETS.bulkPush(u),'bulkPush');
      toast('📊 מסנכרן לגוגל שיטס...','info');
    }
    goPage('users');
  };
  if(ex.filter(a=>a.status==='busy').length>0){
    showConfirm('⚠️ תורים תפוסים',`${ex.filter(a=>a.status==='busy').length} תורים תפוסים בטווח זה לא יימחקו.\nלהמשיך?`,run);
  } else { run(); }
}

function genScript(uid){
  const resolvedUid = uid || window._autoUid;
  const from=document.getElementById('af-fr').value, to=document.getElementById('af-to').value;
  if(!from||!to||from>to){toast('נא לבחור טווח תקין','err');return;}
  const u=db.users.find(x=>x.id===resolvedUid);if(!u)return;
  // Build all slots locally
  const rows=[];
  let cur=new Date(from+'T12:00:00'), end=new Date(to+'T12:00:00');
  while(cur<=end){
    const dn=DAYS[cur.getDay()], wh=u.workingHours[dn];
    if(wh?.a&&wh.s&&wh.e){
      const [sh,sm]=wh.s.split(':').map(Number), [eh,em]=wh.e.split(':').map(Number);
      let mins=sh*60+sm, eM=(eh===0&&em===0?1440:eh*60+em);
      const ds=dateStr(cur);
      const [y,mo,d]=ds.split('-');
      const ddmm=`${d}/${mo}/${y}`;
      while(mins+u.slotDuration<=eM){
        const h=Math.floor(mins/60), m2=mins%60;
        const time=`${String(h).padStart(2,'0')}:${String(m2).padStart(2,'0')}`;
        rows.push([ddmm, time, 'פנוי','','','','','','','','']);
        mins+=u.slotDuration;
      }
    }
    cur.setDate(cur.getDate()+1);
  }
  if(!rows.length){toast('אין ימי עבודה בטווח זה','err');return;}
  // Generate self-contained Apps Script
  const rowsJson=JSON.stringify(rows);
  const script=`// BookPro – ממלא גיליון ישירות
// ${u.name} | ${from} עד ${to} | ${rows.length} שורות
// 1. הדבק בקובץ Apps Script חדש (File → New script)
// 2. לחץ ▶ הרץ ← בחר fillSlots ← אשר הרשאות

function fillSlots() {
  var BP_SS_ID     = '${GAPI.spreadsheetId}';
  var BP_SHEET     = '${u.name}';
  var BP_HEADERS   = ['תאריך','שעה','סטטוס','שם לקוח','טלפון','שירות','מחיר','תיאור','הערות','עדכון אחרון','תמונה'];
  var ss    = SpreadsheetApp.openById(BP_SS_ID);
  var sheet = ss.getSheetByName(BP_SHEET);
  if (!sheet) {
    // First time — create sheet with headers
    sheet = ss.insertSheet(BP_SHEET);
    var hdr = sheet.getRange(1,1,1,BP_HEADERS.length);
    hdr.setValues([BP_HEADERS]);
    hdr.setBackground('#4B0082').setFontColor('#ffffff').setFontWeight('bold').setFontSize(11);
    sheet.setFrozenRows(1);
    [110,70,75,145,135,125,70,135,135,140].forEach(function(w,i){sheet.setColumnWidth(i+1,w);});
  }
  var rows = ${rowsJson};
  // Build set of existing date+time keys to avoid duplicates
  var existing = {};
  if (sheet.getLastRow() > 1) {
    var lastRow = sheet.getLastRow() - 1;
    var existData = sheet.getRange(2, 1, lastRow, 2).getDisplayValues();
    existData.forEach(function(r){
      var t = String(r[1]).trim().substring(0,5);
      existing[String(r[0]).trim() + '_' + t] = true;
    });
  }
  // Filter: only rows not already in sheet
  var newRows = rows.filter(function(r){
    return !existing[String(r[0]).trim() + '_' + String(r[1]).trim().substring(0,5)];
  });
  if (!newRows.length) { Browser.msgBox('כל השורות כבר קיימות בגיליון – לא נוספו כפילויות'); return; }
  var startRow = sheet.getLastRow() + 1;
  var totalRows = Math.max(startRow + newRows.length, 2000);
  sheet.getRange(startRow,1,newRows.length,BP_HEADERS.length).setNumberFormat('@STRING@');
  sheet.getRange(startRow,1,newRows.length,BP_HEADERS.length).setValues(newRows);
  for(var i=0;i<newRows.length;i++){
    sheet.getRange(startRow+i,1,1,BP_HEADERS.length)
         .setBackground(newRows[i][2]==='תפוס'?'#fce4e4':'#e8f5e9');
  }
  SpreadsheetApp.flush();
  // Move spreadsheet to root of Drive (remove from all parent folders)
  var file = DriveApp.getFileById(BP_SS_ID);
  var root = DriveApp.getRootFolder();
  root.addFile(file);
  var parents = file.getParents();
  while (parents.hasNext()) {
    var parent = parents.next();
    if (parent.getId() !== root.getId()) parent.removeFile(file);
  }
  Browser.msgBox('✅ סיום! נוצרו '+rows.length+' שורות בגיליון '+BP_SHEET);
}`;

  closeMo();
  // Show copy modal
  const _newRowCount=(()=>{const ex=new Set((db.appointments[resolvedUid]||[]).map(a=>{const[y,mo,d]=a.date.split('-');return `${d}/${mo}/${y}_${a.time}`;}));return rows.filter(r=>!ex.has(r[0]+'_'+r[1])).length;})();showMo('⚡ סקריפט מוכן – '+rows.length+' שורות ('+_newRowCount+' חדשות)',`
    <div style="margin-bottom:12px;font-size:14px;color:var(--text2);line-height:1.8">
      1. פתח <a href="https://script.google.com" target="_blank" style="color:var(--purple);font-weight:700">script.google.com</a><br>
      2. לחץ <strong>+ פרויקט חדש</strong> (New project)<br>
      3. מחק את הקוד הקיים, <strong>הדבק</strong> את הקוד למטה<br>
      4. לחץ <strong>▶ הרץ</strong> ← בחר <strong>fillSlots</strong><br>
      5. אשר הרשאות (פעם ראשונה בלבד) ← לחץ הרץ שוב
    </div>
    <div style="position:relative">
      <textarea id="gs-code" readonly style="width:100%;height:220px;font-family:monospace;font-size:11px;padding:10px;border:2px solid var(--purple);border-radius:var(--radius-sm);background:var(--bg);color:var(--text1);resize:none;direction:ltr">${script.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
    </div>
    <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
      <button class="btn btn-primary" style="flex:1" onclick="_copyScript()">📋 העתק קוד</button>
      <span id="gs-copied" style="font-size:13px;color:var(--green);display:none">✅ הועתק!</span>
    </div>`,
    [{l:'סגור',c:'btn btn-ghost',f:closeMo}]);
  // Store script text for copy
  window._scriptText=script;
}
function _copyScript(){
  try{
    navigator.clipboard.writeText(window._scriptText||'').then(()=>{
      document.getElementById('gs-copied').style.display='inline';
      setTimeout(()=>{const el=document.getElementById('gs-copied');if(el)el.style.display='none';},2500);

  }

        new Promise(r => setTimeout(()=>r(null), 6000)) // 6s timeout
      ]);
      if (res && res.data && Array.isArray(res.data.users)) {
        const sys = res.data;
        // Merge _deletedUsers — union of local + remote deletion lists
        const deletedIds = new Set([...(db._deletedUsers||[]),...(sys._deletedUsers||[])]);
        db._deletedUsers = [...deletedIds];
        // Authoritative users list = remote list minus any deleted uids
        db.users      = (sys.users||[]).filter(u=>!deletedIds.has(u.id));
        db.adminUsers = (sys.adminUsers||db.adminUsers||[]);
        db.groups     = sys.groups || db.groups || [];
        if (sys._blockedDevices) db._blockedDevices = sys._blockedDevices;
        // Merge devices — union so all logged-in devices appear on all admin views
        if (sys.devices) {
          if (!db.devices) db.devices = {};
          Object.keys(sys.devices).forEach(uid=>{
            if (!db.devices[uid]) db.devices[uid] = [];
            const localIds = new Set(db.devices[uid].map(d=>d.devId));
            (sys.devices[uid]||[]).forEach(d=>{ if(!localIds.has(d.devId)) db.devices[uid].push(d); });
          });
        }
        // Clean orphaned data locally for deleted users
        const validIds = new Set(db.users.map(u=>u.id));
        Object.keys(db.appointments||{}).forEach(uid=>{ if(!validIds.has(uid)) delete db.appointments[uid]; });
        Object.keys(db.chats||{}).forEach(uid=>{ if(!validIds.has(uid)) delete db.chats[uid]; });
        if (sys.chats)      Object.keys(sys.chats).forEach(k=>{ if(!validIds.has(k)) return; if(!db.chats[k]||sys.chats[k].length>=(db.chats[k]||[]).length) db.chats[k]=sys.chats[k]; });
        if (sys.adminChats) Object.keys(sys.adminChats).forEach(k=>{ if(!db.adminChats[k]||sys.adminChats[k].length>=(db.adminChats[k]||[]).length) db.adminChats[k]=sys.adminChats[k]; });
        if (sys.groupChat && sys.groupChat.length >= (db.groupChat||[]).length) db.groupChat = sys.groupChat;
        if (sys._pins && Object.keys(sys._pins).length) db._pins = {...(db._pins||{}), ...sys._pins};
        // Merge appointments — only for valid (non-deleted) users
        if (sys.appointments) {
          Object.keys(sys.appointments).forEach(uid => {
            if (!validIds.has(uid)) return; // skip deleted users
            const remoteArr = sys.appointments[uid] || [];
            if (!db.appointments[uid]) db.appointments[uid] = [];
            const localMap = {};
            db.appointments[uid].forEach(a => { localMap[a.date+'_'+a.time] = a; });
            remoteArr.forEach(ra => {
              const key = ra.date+'_'+ra.time;
              if (localMap[key]) {
                const loc = localMap[key];
                if (ra._driveUrl && !loc._driveUrl) loc._driveUrl = ra._driveUrl;
                if (ra._driveUrl && (!loc.imageUrl || loc.imageUrl === loc._thumb)) loc.imageUrl = ra._driveUrl;
                loc.status = ra.status; loc.clientName = ra.clientName;
                loc.phone = ra.phone; loc.service = ra.service;
                loc.price = ra.price; loc.description = ra.description; loc.notes = ra.notes;
              } else {
                db.appointments[uid].push(ra);
                localMap[key] = ra;
              }
            });
          });
        }
        db.users.forEach(u=>{ if(!db.appointments[u.id]) db.appointments[u.id]=[]; });
        db._pins = db._pins||{}; db._readMarks = db._readMarks||{};
        // If the currently-remembered session belongs to a deleted user, clear it
        try {
          const sessRaw=sessionStorage.getItem('bp_sess')||localStorage.getItem('bp_sess_rem');
          if(sessRaw){const s=JSON.parse(sessRaw);if(s&&s.role==='user'&&deletedIds.has(s.id)){sessionStorage.removeItem('bp_sess');localStorage.removeItem('bp_sess_rem');}}
        } catch(e){}
        localStorage.setItem('bp_db', JSON.stringify(db));
      }
    } catch(e){ console.warn('Boot system load:', e); }
  }

  // Restore login screen HTML
  loginEl.innerHTML = `<div class="login-wrap"><div class="login-card">
    <div class="login-logo">
      <div class="login-icon">✂</div><h1>BookPro</h1><p>מערכת ניהול תורים חכמה</p>
    </div>
    <div class="login-fields">
      <div class="lg-field"><label>מזהה משתמש</label>
        <div class="inp-wrap"><input type="text" id="l-uid" placeholder="טלפון או מזהה" autocomplete="off" autocorrect="off" autocapitalize="off"><span class="inp-ic">👤</span></div>
      </div>
      <div class="lg-field"><label>סיסמה</label>
        <div class="inp-wrap"><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"><span class="inp-ic">🔒</span></div>
      </div>
      <label class="lg-remember">
        <input type="checkbox" id="l-rem"><div class="lg-check-box"></div>
        <span class="lg-remember-lbl">זכור אותי 30 יום</span>
      </label>
      <button class="btn-login" id="l-btn" onclick="doLogin()">כניסה למערכת ›</button>
      <div class="login-err" id="l-err">❌ מזהה משתמש או סיסמה שגויים</div>
    </div>
    <div class="login-footer">BookPro v5 · מאובטח</div>
  </div></div>`;
  // keydown handlers added inline in HTML
  // Try session restore (remember me or session)
  if (!sessRestore()) {
    // Still show login
  }
});
</script>

</html>
